<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>快速輸入 — P&D Program Sync</title>
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/layout.css">
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="navbar__logo">
    <div class="navbar__logo-icon">P</div>
    <span>P&amp;D CENTER</span>
  </a>
  <span class="navbar__week-badge" id="weekBadge">W11</span>
  <div class="navbar__links">
    <a href="index.html"      class="navbar__link">儀表板</a>
    <a href="input.html"      class="navbar__link active">快速輸入</a>
    <a href="risks.html"      class="navbar__link">風險管理</a>
    <a href="actions.html"    class="navbar__link">Action Items</a>
    <a href="milestones.html" class="navbar__link">里程碑</a>

    <a href="review.html"     class="navbar__link">審核流程</a>
  </div>
  <div class="navbar__actions">
    <a href="report.html" class="btn btn-primary btn-sm">📝 生成週報</a>
  </div>
</nav>

<div class="page-container">
  <div class="page-header">
    <div class="page-header__left">
      <h1 class="page-header__title">快速輸入</h1>
      <p class="page-header__sub">更新本週專案進度，或批次貼入文字自動解析</p>
    </div>
  </div>

  <!-- 模式切換 -->
  <div class="tab-bar" id="modeTab" style="max-width:320px;margin-bottom:var(--space-xl);">
    <button class="tab-btn active" data-mode="quick">🎯 快速更新</button>
    <button class="tab-btn" data-mode="batch">📋 批次貼入</button>
  </div>

  <!-- ── 快速更新模式 ──────────────────────────────────────── -->
  <div id="modeQuick">
    <div class="main-grid">
      <!-- 左：表單 -->
      <div class="panel">
        <div class="panel__header">
          <span class="panel__title">更新專案進度</span>
        </div>
        <div class="panel__body">
          <div class="stack">

            <!-- 專案選擇 -->
            <div class="inp-group">
              <label class="inp-label inp-label--required">選擇專案</label>
              <select class="inp" id="qProject">
                <option value="">— 選擇或新增專案 —</option>
              </select>
            </div>

            <!-- 新增專案欄位 -->
            <div class="inp-group" id="newProjGroup" style="display:none;">
              <label class="inp-label">新專案名稱</label>
              <input type="text" class="inp" id="qNewProjName" placeholder="輸入專案名稱">
              <div class="inp-grid" style="margin-top:var(--space-sm);">
                <div class="inp-group">
                  <label class="inp-label">子組</label>
                  <select class="inp" id="qNewTeam">
                    <option value="media-agent">Media Agent</option>
                    <option value="learnmode">LearnMode</option>
                    <option value="chuangzaoli">創造栗</option>
                    <option value="tv-solution">TV Solution</option>
                    <option value="healthcare">Healthcare</option>
                  </select>
                </div>
                <div class="inp-group">
                  <label class="inp-label">目標日期</label>
                  <input type="date" class="inp" id="qTargetDate">
                </div>
              </div>
            </div>

            <!-- 既有專案 — 變更基本資料 -->
            <div id="editProjGroup" style="display:none;">
              <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
                <span class="text-xs text-secondary" style="font-weight:600;letter-spacing:.03em;">專案基本資料</span>
                <button type="button" id="btnToggleEditProj" class="btn btn-ghost btn-sm" style="font-size:11px;padding:2px 8px;">✏️ 變更</button>
              </div>
              <div id="editProjFields" style="display:none;">
                <div class="inp-group">
                  <label class="inp-label">專案名稱</label>
                  <input type="text" class="inp" id="qEditProjName" placeholder="專案名稱">
                </div>
                <div class="inp-grid" style="margin-top:var(--space-sm);">
                  <div class="inp-group">
                    <label class="inp-label">子組</label>
                    <select class="inp" id="qEditTeam">
                      <option value="media-agent">Media Agent</option>
                      <option value="learnmode">LearnMode</option>
                      <option value="chuangzaoli">創造栗</option>
                      <option value="tv-solution">TV Solution</option>
                      <option value="healthcare">Healthcare</option>
                    </select>
                  </div>
                  <div class="inp-group">
                    <label class="inp-label">目標日期</label>
                    <input type="date" class="inp" id="qEditTargetDate">
                  </div>
                </div>
              </div>
            </div>

            <!-- 狀態 + 進度 -->
            <div class="inp-grid">
              <div class="inp-group">
                <label class="inp-label inp-label--required">專案狀態</label>
                <select class="inp" id="qStatus">
                  <option value="on-track">🟢 On Track</option>
                  <option value="at-risk">🟡 At Risk</option>
                  <option value="behind">🔴 Behind</option>
                </select>
              </div>
              <div class="inp-group">
                <label class="inp-label">負責人</label>
                <select class="inp owner-select" id="qOwner">
                  <option value="">— 選擇 —</option>
                </select>
              </div>
            </div>

            <!-- 完成率 -->
            <div class="inp-group">
              <label class="inp-label">完成率</label>
              <!-- 模式切換 -->
              <div style="display:flex;gap:6px;margin-bottom:10px;">
                <button type="button" id="btnAutoMode"   class="btn btn-sm btn-primary" onclick="window.setProgressMode('auto')">🤖 自動計算</button>
                <button type="button" id="btnManualMode" class="btn btn-sm btn-outline" onclick="window.setProgressMode('manual')">✏️ 手動設定</button>
              </div>
              <!-- 自動計算面板 -->
              <div id="autoProgressWrap">
                <div style="display:flex;justify-content:space-between;align-items:center;background:var(--color-bg-secondary);border-radius:var(--radius-md);padding:10px 14px;">
                  <span class="text-sm text-secondary">依 Actions 完成率：</span>
                  <span id="autoProgressVal" style="font-weight:700;font-size:1.2rem;color:var(--color-info);">—</span>
                </div>
                <p class="text-xs" style="color:var(--color-text-tertiary);margin-top:5px;">尚無 Actions 時，以手動設定值作為備用</p>
              </div>
              <!-- 手動 slider -->
              <div id="manualProgressWrap" style="display:none;">
                <input type="range" class="inp-range" id="qProgress" min="0" max="100" value="50">
                <div style="display:flex;justify-content:space-between;font-size:var(--font-size-xs);color:var(--color-text-tertiary);margin-top:4px;">
                  <span>0%</span>
                  <span style="font-weight:700;font-size:var(--font-size-md);color:var(--color-info)" id="progressVal">50%</span>
                  <span>100%</span>
                </div>
              </div>
            </div>

            <!-- 即時進度條預覽 -->
            <div class="progress-bar-wrap" style="margin-top:-var(--space-sm);">
              <div class="progress-bar">
                <div class="progress-bar__fill" id="progressPreview" style="width:50%;"></div>
              </div>
            </div>

            <!-- 本週完成 -->
            <div class="inp-group">
              <label class="inp-label">本週完成事項</label>
              <textarea class="inp" id="qWeekDone" rows="3" placeholder="簡述本週完成的工作…"></textarea>
            </div>

            <!-- 阻塞項 -->
            <div class="inp-group">
              <label class="inp-label">阻塞項目</label>
              <textarea class="inp" id="qBlockers" rows="2" placeholder="描述當前阻塞因素（若無請留空）…"></textarea>
            </div>

            <!-- 風險 -->
            <div class="inp-group">
              <label class="inp-label">新增關聯風險</label>
              <div style="display:flex;gap:var(--space-sm);">
                <select class="inp" id="qRiskLevel" style="width:100px;flex-shrink:0;">
                  <option value="">無</option>
                  <option value="high">🔴 高</option>
                  <option value="medium">🟡 中</option>
                  <option value="low">🟢 低</option>
                </select>
                <input type="text" class="inp" id="qRiskDesc" placeholder="風險描述（選填）">
              </div>
            </div>

          </div>
        </div>
        <div class="panel__footer">
          <button class="btn btn-outline btn-sm" id="btnReset">重置</button>
          <button class="btn btn-primary" id="btnSaveQuick" style="margin-left:auto;">✓ 儲存更新</button>
        </div>
      </div>

      <!-- 右：預覽卡片 -->
      <div class="stack">
        <div class="panel">
          <div class="panel__header">
            <span class="panel__title">即時預覽</span>
          </div>
          <div class="panel__body" id="quickPreview">
            <div class="empty-state">
              <span class="empty-state__icon">👆</span>
              <p class="empty-state__msg">選擇專案後顯示預覽</p>
            </div>
          </div>
        </div>

        <!-- 最近更新 -->
        <div class="panel">
          <div class="panel__header">
            <span class="panel__title">最近更新</span>
          </div>
          <div class="panel__body" id="recentList" style="padding:var(--space-md);"></div>
        </div>

        <!-- 成員管理 -->
        <div class="panel">
          <div class="panel__header">
            <span class="panel__title">👥 成員管理</span>
            <button class="btn btn-primary btn-sm" id="btnAddMember">+ 新增成員</button>
          </div>
          <div class="panel__body" id="memberList" style="padding:var(--space-md);max-height:360px;overflow-y:auto;"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ── 批次貼入模式 ──────────────────────────────────────── -->
  <div id="modeBatch" style="display:none;">
    <div class="main-grid">
      <!-- 左：貼上區 -->
      <div class="panel">
        <div class="panel__header">
          <span class="panel__title">批次貼入</span>
          <select class="inp" id="batchSource" style="width:120px;">
            <option value="raw">純文字</option>
            <option value="slack">Slack</option>
            <option value="email">Email</option>
            <option value="jira">JIRA</option>
          </select>
        </div>
        <div class="panel__body">
          <div class="inp-group">
            <label class="inp-label">貼上本週更新文字</label>
            <textarea class="inp" id="batchText" rows="16" placeholder="將 Slack 訊息、Email 或任意文字貼入這裡…

範例：
✅ AI Content Pipeline 完成語音轉文字整合，進度 72%
⚠️ Healthcare AI 醫療授權未簽署，延遲 @Ryan Hsu 2026/03/31
🔴 LearnMode Mobile RN 升級失敗，Michael Wu 負責修復"></textarea>
          </div>
        </div>
        <div class="panel__footer">
          <span class="text-xs text-secondary">支援 Slack / Email / JIRA / 純文字格式</span>
          <button class="btn btn-primary" id="btnParse" style="margin-left:auto;">🔍 解析文字</button>
        </div>
      </div>

      <!-- 右：解析結果 -->
      <div class="panel">
        <div class="panel__header">
          <span class="panel__title">解析預覽</span>
          <button class="btn btn-success btn-sm" id="btnImportAll" style="display:none;">✓ 全部匯入</button>
        </div>
        <div class="panel__body" id="parseResult" style="padding:var(--space-md);">
          <div class="empty-state">
            <span class="empty-state__icon">📋</span>
            <p class="empty-state__msg">解析後在此顯示結果<br>可逐項勾選確認匯入</p>
          </div>
        </div>
      </div>
    </div>
  </div>

</div>

<div class="toast-container" id="toastContainer"></div>

<script type="module">
import { store }    from './assets/js/store.js';
import { seedData } from './assets/data/seed.js';
import { initApi, fetchReports, fetchReportContent } from './assets/js/api.js';
import { parseHistoricalReport, syncToStore } from './assets/js/parse-history.js';

async function _autoSync() {
  try {
    const ok = await initApi();
    if (!ok) return false;
    if (store.getAll("projects").some(p => p._source === "history")) return false;
    const rpts = await fetchReports();
    if (!rpts.length) return false;
    for (let i = 0; i < Math.min(2, rpts.length); i++) {
      const c = await fetchReportContent(rpts[i].filename);
      syncToStore(parseHistoricalReport(c, rpts[i].filename), store, { replaceAll: i === 0 });
    }
    return true;
  } catch { return false; }
}
import { toast, renderBadge, formatDate, generateId, relativeTime, modal, confirm as uiConfirm } from './assets/js/ui.js';
import { parseText } from './assets/js/import.js';
import { MEMBERS, TEAMS } from './assets/data/schema.js';

_autoSync().then(ok => {
  if (!ok) seedData();
  window.setProgressMode('auto');
});

const TEAM_NAMES = {
  'media-agent':'Media Agent','learnmode':'LearnMode',
  'chuangzaoli':'創造栗','tv-solution':'TV Solution','healthcare':'Healthcare'
};

// ── 模式切換 ───────────────────────────────────────────────────
document.getElementById('modeTab').addEventListener('click', e => {
  const btn = e.target.closest('.tab-btn');
  if (!btn) return;
  document.querySelectorAll('#modeTab .tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const mode = btn.dataset.mode;
  document.getElementById('modeQuick').style.display = mode === 'quick' ? '' : 'none';
  document.getElementById('modeBatch').style.display = mode === 'batch' ? '' : 'none';
});

// ── 載入專案下拉 ───────────────────────────────────────────────
function loadProjectSelect() {
  const sel = document.getElementById('qProject');
  const projects = store.getAll('projects');
  const groups = {};
  projects.forEach(p => {
    if (!groups[p.team]) groups[p.team] = [];
    groups[p.team].push(p);
  });

  sel.innerHTML = '<option value="">— 選擇專案 —</option><option value="__new__">+ 新增專案</option>';
  Object.entries(groups).forEach(([team, list]) => {
    const og = document.createElement('optgroup');
    og.label = TEAM_NAMES[team] || team;
    list.forEach(p => {
      const opt = document.createElement('option');
      opt.value = p.id;
      opt.textContent = `${p.name} (${p.progress}%)`;
      og.appendChild(opt);
    });
    sel.appendChild(og);
  });
}

loadProjectSelect();

// ── 專案選擇變更 ───────────────────────────────────────────────
document.getElementById('qProject').addEventListener('change', function() {
  const id = this.value;
  const newGroup  = document.getElementById('newProjGroup');
  const editGroup = document.getElementById('editProjGroup');

  if (id === '__new__') {
    newGroup.style.display  = '';
    editGroup.style.display = 'none';
    updatePreview(null);
    return;
  }
  newGroup.style.display = 'none';

  if (!id) {
    editGroup.style.display = 'none';
    updatePreview(null);
    return;
  }

  // 顯示既有專案基本資料區
  editGroup.style.display = '';
  document.getElementById('editProjFields').style.display = 'none'; // 預設收合

  const p = store.getById('projects', id);
  if (!p) return;

  // 預填編輯欄位
  document.getElementById('qEditProjName').value  = p.name || '';
  document.getElementById('qEditTeam').value      = p.team || 'media-agent';
  document.getElementById('qEditTargetDate').value = p.targetDate || '';

  document.getElementById('qStatus').value   = p.status;
  document.getElementById('qProgress').value = p.progress ?? 50;
  document.getElementById('qOwner').value     = p.owner || '';
  document.getElementById('qWeekDone').value  = p.weekDone || '';
  document.getElementById('qBlockers').value  = p.blockers || '';
  updateProgressDisplay(p.progress ?? 50);
  window.setProgressMode(p.progressMode || 'auto');
  updatePreview({ ...p, progress: getEffectiveProgress(p.name) });
});

// ── 變更專案基本資料 toggle ─────────────────────────────────────
document.getElementById('btnToggleEditProj').addEventListener('click', () => {
  const fields = document.getElementById('editProjFields');
  const btn    = document.getElementById('btnToggleEditProj');
  const open   = fields.style.display === 'none';
  fields.style.display = open ? '' : 'none';
  btn.textContent = open ? '▲ 收合' : '✏️ 變更';
});

// ── 完成率模式切換 ──────────────────────────────────────────────
let _progressMode = 'auto';

window.setProgressMode = function setProgressMode(mode) {
  _progressMode = mode;
  document.getElementById('btnAutoMode').className   = mode === 'auto'   ? 'btn btn-sm btn-primary' : 'btn btn-sm btn-outline';
  document.getElementById('btnManualMode').className = mode === 'manual' ? 'btn btn-sm btn-primary' : 'btn btn-sm btn-outline';
  document.getElementById('autoProgressWrap').style.display   = mode === 'auto'   ? 'block' : 'none';
  document.getElementById('manualProgressWrap').style.display = mode === 'manual' ? 'block' : 'none';
  if (mode === 'auto') refreshAutoProgress();
  // 同步預覽
  const id = document.getElementById('qProject').value;
  const p  = (id && id !== '__new__') ? store.getById('projects', id) : null;
  if (p) updatePreview({ ...p, progress: getEffectiveProgress(p.name), status: document.getElementById('qStatus').value });
}

function getEffectiveProgress(projName) {
  if (_progressMode !== 'auto') return parseInt(document.getElementById('qProgress').value);
  const acts = store.getAll('actions').filter(a => a.project === projName);
  if (acts.length === 0) return parseInt(document.getElementById('qProgress').value);
  return Math.round(acts.filter(a => a.status === 'done').length / acts.length * 100);
}

function refreshAutoProgress() {
  const id   = document.getElementById('qProject').value;
  const proj = (id && id !== '__new__') ? store.getById('projects', id) : null;
  const name = proj ? proj.name : (document.getElementById('qNewProjName')?.value?.trim() || '');
  if (!name) { document.getElementById('autoProgressVal').textContent = '—'; return; }
  const acts = store.getAll('actions').filter(a => a.project === name);
  if (acts.length === 0) {
    document.getElementById('autoProgressVal').textContent = '尚無 Actions';
  } else {
    const pct = Math.round(acts.filter(a => a.status === 'done').length / acts.length * 100);
    document.getElementById('autoProgressVal').textContent = `${pct}%`;
  }
}

// ── 進度條即時更新 ─────────────────────────────────────────────
document.getElementById('qProgress').addEventListener('input', function() {
  const v = parseInt(this.value);
  updateProgressDisplay(v);
  const id = document.getElementById('qProject').value;
  if (id && id !== '__new__') {
    const p = store.getById('projects', id);
    if (p) updatePreview({ ...p, progress: v, status: document.getElementById('qStatus').value });
  }
});

document.getElementById('qStatus').addEventListener('change', function() {
  const id = document.getElementById('qProject').value;
  if (id && id !== '__new__') {
    const p = store.getById('projects', id);
    if (p) updatePreview({ ...p, status: this.value });
  }
});

function updateProgressDisplay(v) {
  document.getElementById('progressVal').textContent = `${v}%`;
  const fill = document.getElementById('progressPreview');
  const status = document.getElementById('qStatus').value;
  const color = status === 'on-track' ? 'var(--color-success)' : status === 'at-risk' ? 'var(--color-warning)' : 'var(--color-danger)';
  fill.style.width   = `${v}%`;
  fill.style.background = color;
}

// ── 預覽 ───────────────────────────────────────────────────────
function updatePreview(p) {
  const el = document.getElementById('quickPreview');
  if (!p) {
    el.innerHTML = `<div class="empty-state"><span class="empty-state__icon">👆</span><p class="empty-state__msg">選擇專案後顯示預覽</p></div>`;
    return;
  }
  const barColor = p.status === 'on-track' ? 'var(--color-success)' : p.status === 'at-risk' ? 'var(--color-warning)' : 'var(--color-danger)';
  el.innerHTML = `
    <div class="stack-sm">
      <div class="row row--between">
        <strong style="font-size:var(--font-size-md)">${p.name}</strong>
        ${renderBadge(p.status)}
      </div>
      <div class="row">
        <span class="badge badge-neutral">${TEAM_NAMES[p.team] || p.team}</span>
        <span class="text-sm text-secondary">負責：${p.owner || '—'}</span>
      </div>
      <div>
        <div style="display:flex;justify-content:space-between;margin-bottom:4px;">
          <span class="text-xs text-secondary">完成率${_progressMode === 'auto' ? ' 🤖' : ''}</span>
          <span class="font-600" style="color:${barColor}">${p.progress}%</span>
        </div>
        <div class="progress-bar"><div class="progress-bar__fill" style="width:${p.progress}%;background:${barColor}"></div></div>
      </div>
      ${p.weekDone ? `<p class="text-sm"><strong>本週完成：</strong>${p.weekDone}</p>` : ''}
      ${p.blockers  ? `<p class="text-sm" style="color:var(--color-danger)"><strong>⚠️ 阻塞：</strong>${p.blockers}</p>` : ''}
    </div>`;
}

// ── 儲存 ───────────────────────────────────────────────────────
document.getElementById('btnSaveQuick').addEventListener('click', () => {
  const projId      = document.getElementById('qProject').value;
  const status      = document.getElementById('qStatus').value;
  const manualProg  = parseInt(document.getElementById('qProgress').value);
  const progressMode = _progressMode;
  const owner       = document.getElementById('qOwner').value;
  const weekDone    = document.getElementById('qWeekDone').value.trim();
  const blockers    = document.getElementById('qBlockers').value.trim();
  const riskLevel   = document.getElementById('qRiskLevel').value;
  const riskDesc    = document.getElementById('qRiskDesc').value.trim();

  let item;
  if (projId === '__new__') {
    const name = document.getElementById('qNewProjName').value.trim();
    if (!name) { toast('請輸入專案名稱', 'error'); return; }
    const progress = getEffectiveProgress(name);
    item = {
      id: generateId(),
      name,
      team: document.getElementById('qNewTeam').value,
      targetDate: document.getElementById('qTargetDate').value,
      status, progress, progressMode, owner, weekDone, blockers,
    };
  } else if (projId) {
    item = store.getById('projects', projId);
    if (!item) { toast('找不到專案', 'error'); return; }
    const progress = getEffectiveProgress(item.name);
    // 若使用者展開並編輯了基本資料，一併更新
    const editFields = document.getElementById('editProjFields');
    if (editFields && editFields.style.display !== 'none') {
      const newName = document.getElementById('qEditProjName').value.trim();
      if (newName) item.name = newName;
      item.team       = document.getElementById('qEditTeam').value || item.team;
      item.targetDate = document.getElementById('qEditTargetDate').value || item.targetDate;
    }
    Object.assign(item, { status, progress, progressMode, owner, weekDone, blockers });
  } else {
    toast('請選擇專案', 'error'); return;
  }

  store.save('projects', item);

  if (riskLevel && riskDesc) {
    store.save('risks', {
      id: generateId(),
      level: riskLevel,
      description: riskDesc,
      project: item.name,
      team: item.team,
      owner,
      status: 'open',
      mitigation: '',
      weekStart: new Date().toISOString().split('T')[0],
    });
  }

  toast('✅ 儲存成功', 'success');
  loadProjectSelect();
  renderRecentList();
  updatePreview(item);
});

// ── 重置 ───────────────────────────────────────────────────────
document.getElementById('btnReset').addEventListener('click', () => {
  document.getElementById('qProject').value = '';
  document.getElementById('qStatus').value = 'on-track';
  document.getElementById('qProgress').value = 50;
  document.getElementById('qOwner').value = '';
  document.getElementById('qWeekDone').value = '';
  document.getElementById('qBlockers').value = '';
  document.getElementById('qRiskLevel').value = '';
  document.getElementById('qRiskDesc').value = '';
  document.getElementById('newProjGroup').style.display  = 'none';
  document.getElementById('editProjGroup').style.display = 'none';
  updateProgressDisplay(50);
  updatePreview(null);
});

// ── 最近更新列表 ───────────────────────────────────────────────
function renderRecentList() {
  const projects = store.sortBy('projects', '_updatedAt', 'desc').slice(0, 5);
  const el = document.getElementById('recentList');
  if (!projects.length) { el.innerHTML = '<p class="text-sm text-secondary">尚無資料</p>'; return; }
  el.innerHTML = projects.map(p => `
    <div class="project-row project-row--${p.status}" style="margin-bottom:4px;">
      <div class="project-row__dot project-row__dot--${p.status}"></div>
      <span class="flex-1 text-sm">${p.name}</span>
      <span class="text-xs text-secondary">${p.progress}%</span>
      <span class="text-xs text-tertiary">${relativeTime(p._updatedAt)}</span>
    </div>`).join('');
}
renderRecentList();

// ── 批次解析 ───────────────────────────────────────────────────
let parsedData = null;

document.getElementById('btnParse').addEventListener('click', () => {
  const text   = document.getElementById('batchText').value.trim();
  const source = document.getElementById('batchSource').value;
  if (!text) { toast('請先貼入文字', 'error'); return; }

  parsedData = parseText(text, source);
  renderParseResult(parsedData);
});

function renderParseResult(data) {
  const el  = document.getElementById('parseResult');
  const btn = document.getElementById('btnImportAll');

  const total = data.projects.length + data.risks.length + data.actions.length + data.milestones.length;

  if (total === 0) {
    el.innerHTML = `<div class="empty-state">
      <span class="empty-state__icon">🤔</span>
      <p class="empty-state__msg">未偵測到可解析的資料<br>請確認文字格式或換一種來源設定</p>
    </div>`;
    btn.style.display = 'none';
    return;
  }

  btn.style.display = '';

  const sections = [
    { key:'projects',  label:'📁 專案', icon:'on-track' },
    { key:'risks',     label:'⚠️ 風險', icon:'at-risk' },
    { key:'actions',   label:'✅ Actions', icon:'on-track' },
    { key:'milestones',label:'📅 里程碑', icon:'on-track' },
  ];

  let html = `<p class="text-sm text-secondary" style="margin-bottom:var(--space-md);">共解析到 ${total} 筆資料，請勾選確認匯入：</p>`;

  sections.forEach(sec => {
    if (!data[sec.key]?.length) return;
    html += `<div class="section-heading">${sec.label} (${data[sec.key].length})</div>`;
    data[sec.key].forEach((item, idx) => {
      const label = item.name || item.description || item.task || '(未命名)';
      html += `
        <label style="display:flex;align-items:center;gap:var(--space-sm);padding:6px var(--space-sm);border-radius:var(--radius-sm);cursor:pointer;margin-bottom:4px;border:1px solid var(--color-border-default);background:var(--color-bg-primary);">
          <input type="checkbox" checked data-type="${sec.key}" data-idx="${idx}" style="accent-color:var(--color-info);">
          <span class="text-sm flex-1">${label.substring(0,60)}${label.length>60?'…':''}</span>
          ${item.level ? renderBadge(item.level) : item.status ? renderBadge(item.status) : ''}
        </label>`;
    });
  });

  el.innerHTML = html;
}

document.getElementById('btnImportAll').addEventListener('click', () => {
  if (!parsedData) return;
  const checkboxes = document.querySelectorAll('#parseResult input[type=checkbox]:checked');
  let count = 0;

  checkboxes.forEach(cb => {
    const type = cb.dataset.type;
    const idx  = parseInt(cb.dataset.idx);
    const item = parsedData[type]?.[idx];
    if (!item) return;

    if (type === 'projects')   store.save('projects', item);
    if (type === 'risks')      store.save('risks', item);
    if (type === 'actions')    store.save('actions', item);
    if (type === 'milestones') store.save('milestones', item);
    count++;
  });

  toast(`✅ 已匯入 ${count} 筆資料`, 'success');
  document.getElementById('batchText').value = '';
  document.getElementById('parseResult').innerHTML = `<div class="empty-state">
    <span class="empty-state__icon">✅</span>
    <p class="empty-state__msg">匯入完成</p>
  </div>`;
  document.getElementById('btnImportAll').style.display = 'none';
  loadProjectSelect();
  renderRecentList();
});

window.addEventListener('store:updated', e => {
  renderRecentList();
  if (!e.detail?.key || e.detail.key === 'members') {
    populateOwnerSelects();
    renderMemberList();
  }
});

// ── 成員管理 ────────────────────────────────────────────────────
const TEAM_LABEL = Object.fromEntries(TEAMS.map(t => [t.id, t.name]));

function initMembers() {
  if (store.getAll('members').length > 0) return;
  MEMBERS.forEach(m => store.save('members', { ...m }));
}

function getMembers() {
  return store.sortBy('members', 'name', 'asc');
}

function populateOwnerSelects() {
  const members = getMembers();
  const opts = '<option value="">— 選擇 —</option>' +
    members.map(m => `<option value="${m.name}">${m.name}</option>`).join('');
  document.querySelectorAll('.owner-select').forEach(sel => {
    const cur = sel.value;
    sel.innerHTML = opts;
    sel.value = cur; // 保留已選值
  });
}

function renderMemberList() {
  const members = getMembers();
  const el = document.getElementById('memberList');
  if (!members.length) {
    el.innerHTML = '<p class="text-sm text-secondary">尚無成員</p>';
    return;
  }
  el.innerHTML = members.map(m => `
    <div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--color-border-light);">
      <div style="width:32px;height:32px;border-radius:50%;background:var(--color-info);color:#fff;
           display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;">
        ${m.avatar || m.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()}
      </div>
      <div style="flex:1;min-width:0;">
        <div class="text-sm" style="font-weight:600;">${m.name}</div>
        <div class="text-xs text-secondary">${TEAM_LABEL[m.team] || m.team || '—'}${m.role ? ' · ' + m.role : ''}</div>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="window.editMember('${m.id}')" title="編輯" style="padding:4px 6px;">✏️</button>
      <button class="btn btn-ghost btn-sm" onclick="window.deleteMember('${m.id}')" title="刪除" style="padding:4px 6px;color:var(--color-danger);">🗑</button>
    </div>`).join('');
}

function memberFormHtml(m = {}) {
  const teamOpts = TEAMS.map(t =>
    `<option value="${t.id}" ${m.team === t.id ? 'selected' : ''}>${t.name}</option>`
  ).join('');
  return `
    <div class="modal__header">
      <span class="modal__title">${m.id ? '編輯成員' : '新增成員'}</span>
      <button class="modal__close" type="button">✕</button>
    </div>
    <div class="modal__body">
      <div class="stack">
        <div class="inp-group">
          <label class="inp-label">姓名 <span style="color:var(--color-danger)">*</span></label>
          <input class="inp" id="mName" value="${m.name || ''}" placeholder="輸入姓名">
        </div>
        <div class="inp-group">
          <label class="inp-label">子組</label>
          <select class="inp" id="mTeam">
            <option value="">— 選擇 —</option>
            ${teamOpts}
          </select>
        </div>
        <div class="inp-group">
          <label class="inp-label">職稱 / 角色</label>
          <input class="inp" id="mRole" value="${m.role || ''}" placeholder="例：Engineer、PM、QA…">
        </div>
      </div>
    </div>
    <div class="modal__footer">
      <button class="btn btn-outline" id="mCancel">取消</button>
      <button class="btn btn-primary" id="mSave">儲存</button>
    </div>`;
}

document.getElementById('btnAddMember').addEventListener('click', () => {
  const { close, el } = modal(memberFormHtml(), { size: 'sm' });
  el.querySelector('.modal__close').addEventListener('click', close);
  el.querySelector('#mCancel').addEventListener('click', close);
  el.querySelector('#mSave').addEventListener('click', () => {
    const name = el.querySelector('#mName').value.trim();
    if (!name) { toast('請輸入姓名', 'error'); return; }
    const avatar = name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
    const item = {
      id: generateId(),
      name,
      team: el.querySelector('#mTeam').value,
      role: el.querySelector('#mRole').value.trim(),
      avatar,
    };
    close();
    store.save('members', item);
    toast('✅ 成員已新增', 'success');
  });
});

window.editMember = function(id) {
  const m = store.getById('members', id);
  if (!m) return;
  const { close, el } = modal(memberFormHtml(m), { size: 'sm' });
  el.querySelector('.modal__close').addEventListener('click', close);
  el.querySelector('#mCancel').addEventListener('click', close);
  el.querySelector('#mSave').addEventListener('click', () => {
    const name = el.querySelector('#mName').value.trim();
    if (!name) { toast('請輸入姓名', 'error'); return; }
    Object.assign(m, {
      name,
      team: el.querySelector('#mTeam').value,
      role: el.querySelector('#mRole').value.trim(),
      avatar: name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase(),
    });
    close();
    store.save('members', m);
    toast('✅ 成員已更新', 'success');
  });
};

window.deleteMember = async function(id) {
  const m = store.getById('members', id);
  if (!m) return;
  if (!window.confirm(`確定刪除成員「${m.name}」？`)) return;
  store.delete('members', id);
  toast('已刪除', 'success');
};

initMembers();
populateOwnerSelects();
renderMemberList();
</script>
</body>
</html>
