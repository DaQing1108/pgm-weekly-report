<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>P&D Center Program Sync</title>
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/layout.css">
</head>
<body>

<!-- ── Navbar ──────────────────────────────────────────────── -->
<nav class="navbar">
  <a href="index.html" class="navbar__logo">
    <div class="navbar__logo-icon">P</div>
    <span>P&amp;D CENTER</span>
  </a>
  <span class="navbar__week-badge" id="weekBadge">–</span>
  <div class="navbar__links">
    <a href="index.html"      class="navbar__link active">Dashboard</a>
    <a href="input.html"      class="navbar__link">Quick Input</a>
    <a href="risks.html"      class="navbar__link">Risks</a>
    <a href="actions.html"    class="navbar__link">Action Items</a>
    <a href="milestones.html" class="navbar__link">Milestones</a>
    <a href="review.html"     class="navbar__link">Review</a>
    <a href="resources.html" class="navbar__link">Resources</a>

  </div>
  <div class="navbar__actions">
    <button class="btn btn-outline btn-sm" id="btnApiKey">🔑 API Key</button>
    <a href="report.html" class="btn btn-primary btn-sm">📝 生成週報</a>
  </div>
</nav>

<!-- ── Page ────────────────────────────────────────────────── -->
<div class="page-container">

  <!-- 週次歷史選擇器 -->
  <div id="weekNavBar" style="display:none;margin-bottom:var(--space-md);background:var(--color-surface);border:1px solid var(--color-border-default);border-radius:var(--radius-md);padding:10px var(--space-lg);align-items:center;gap:10px;">
    <span style="font-size:12px;font-weight:600;color:var(--color-text-secondary);white-space:nowrap;">查看週次：</span>
    <select id="weekSelect" class="inp" style="width:160px;padding:4px 8px;font-size:var(--font-size-sm);" onchange="loadWeekView(this.value)">
    </select>
    <span id="weekNavMeta" style="font-size:11px;color:var(--color-text-tertiary);"></span>
  </div>

  <!-- 歷史瀏覽 banner -->
  <div id="historyBanner" style="display:none;margin-bottom:var(--space-md);background:#fff8e6;border:1px solid #f0b429;border-radius:var(--radius-md);padding:10px var(--space-lg);align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;">
    <div>
      <span style="font-size:13px;font-weight:600;color:#b45309;">📅 歷史瀏覽模式</span>
      <span id="historyBannerText" style="font-size:12px;color:#92400e;margin-left:8px;"></span>
    </div>
    <button class="btn btn-outline btn-sm" onclick="returnToCurrentWeek()">↩ 回到本週</button>
  </div>

  <!-- KPI Row -->
  <div class="kpi-row" id="kpiRow">
    <div class="kpi-card kpi-ok">
      <div class="kpi-card__label">專案健康度</div>
      <div class="kpi-card__value" id="kpiHealth">—%</div>
      <div class="kpi-card__sub" id="kpiHealthSub">載入中…</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-card__label">進行中專案</div>
      <div class="kpi-card__value" id="kpiTotal">—</div>
      <div class="kpi-card__sub" id="kpiTotalSub"></div>
    </div>
    <div class="kpi-card" id="kpiRisksCard">
      <div class="kpi-card__label">需關注專案</div>
      <div class="kpi-card__value" id="kpiRisks">—</div>
      <div class="kpi-card__sub" id="kpiRisksSub">At Risk + 落後</div>
    </div>
    <div class="kpi-card" id="kpiActionsCard">
      <div class="kpi-card__label">逾期 Actions</div>
      <div class="kpi-card__value" id="kpiActions">—</div>
      <div class="kpi-card__sub" id="kpiActionsSub">待追蹤</div>
    </div>
  </div>

  <!-- Main Grid：僅專案列表，全寬 -->
  <div class="main-grid" style="grid-template-columns:1fr;">

    <!-- 專案列表 -->
    <div class="panel">
      <div class="panel__header" style="flex-wrap:wrap;gap:var(--space-sm);">
        <span class="panel__title">專案進度總覽</span>
        <div style="display:flex;align-items:center;gap:var(--space-sm);flex-wrap:wrap;margin-left:auto;">
          <select class="inp" id="teamFilter" style="width:130px;padding:4px 8px;font-size:var(--font-size-sm);">
            <option value="all">全部子組</option>
            <option value="media-agent">Media Agent</option>
            <option value="learnmode">LearnMode</option>
            <option value="chuangzaoli">創造栗</option>
            <option value="tv-solution">TV Solution</option>
            <option value="healthcare">Healthcare</option>
            <option value="org-mgmt">組織管理</option>
          </select>
          <div class="tab-bar" id="statusFilter">
            <button class="tab-btn active" data-filter="all">全部</button>
            <button class="tab-btn" data-filter="on-track">🟢 正常</button>
            <button class="tab-btn" data-filter="at-risk">🟡 風險</button>
            <button class="tab-btn" data-filter="behind">🔴 落後</button>
            <button class="tab-btn" data-filter="paused">⏸️ 暫緩</button>
          </div>
        </div>
      </div>
      <div class="panel__body" id="projectList" style="padding:var(--space-md) var(--space-lg);">
        <div class="empty-state">
          <span class="empty-state__icon">⏳</span>
          <p class="empty-state__msg">載入中…</p>
        </div>
      </div>
      <div class="panel__footer">
        <span class="text-sm text-secondary" id="projectCount">0 個專案</span>
        <a href="input.html" class="btn btn-outline btn-sm" style="margin-left:auto;">+ 新增專案</a>
      </div>
    </div>

  </div>

  <!-- V3：歷史週報中心（後端已連線時顯示） -->
  <div id="archiveSection" style="display:none;margin-top:var(--space-xl);">
    <div class="panel">
      <div class="panel__header" style="display:flex;justify-content:space-between;align-items:center;">
        <span class="panel__title">☁ 歷史週報中心</span>
        <div style="display:flex;align-items:center;gap:8px;">
          <span class="badge badge--info" id="archiveBadge">載入中…</span>
          <button class="btn btn-primary btn-sm" id="btnImportMd">⬆ 匯入週報</button>
          <input type="file" id="mdFileInput" accept=".md" style="display:none;">
        </div>
      </div>
      <div class="panel__body" id="archiveList" style="padding:var(--space-md) var(--space-lg);">
        <div class="empty-state">
          <span class="empty-state__icon">☁</span>
          <p class="empty-state__msg">尚無雲端週報</p>
        </div>
      </div>
    </div>
  </div>

  <!-- 需決策事項（歷史週報下方） -->
  <div style="margin-top:var(--space-xl);">
    <div class="panel">
      <div class="panel__header">
        <span class="panel__title">需決策事項</span>
      </div>
      <div class="panel__body" id="decisionList" style="padding:var(--space-md) var(--space-lg);">
        <div class="empty-state">
          <span class="empty-state__icon">📋</span>
          <p class="empty-state__msg">無待決策事項</p>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Toast container -->
<div class="toast-container" id="toastContainer"></div>

<script type="module">
import { store }    from './assets/js/store.js';
import { seedData } from './assets/data/seed.js';
import { toast, renderBadge, formatDate, isOverdue } from './assets/js/ui.js';
import { initApi, fetchReports, fetchReportContent, saveReport, downloadUrl, deleteReport, listWeeks, getWeekState, saveWeekState } from './assets/js/api.js';
import { setSessionWeek } from './assets/js/app-init.js';
import { modal } from './assets/js/ui.js';
import { parseHistoricalReport, syncToStore } from './assets/js/parse-history.js';

// ── 歷史週次瀏覽狀態 ────────────────────────────────────────────
let _viewState   = null;  // null = 本週；object = 歷史週次資料
let _viewingLabel = null; // 目前瀏覽的週次標籤

// ── 從 viewState 或 store 取得顯示資料 ─────────────────────────
function _displayProjects() {
  return _viewState ? (_viewState.projects || []) : store.getAll('projects');
}
function _displayRisks() {
  return _viewState ? (_viewState.risks || []) : store.getAll('risks');
}
function _displaySnap() {
  if (!_viewState) return null;
  return (_viewState.snapshots || []).find(s => s.weekLabel === _viewingLabel)
      || (_viewState.snapshots || []).slice(-1)[0]
      || null;
}

// ── 自動從後端歷史週報同步真實資料 ────────────────────────────
async function autoSyncFromHistory() {
  try {
    const available = await initApi();
    if (!available) return false;

    // 若已有任何專案資料則跳過（種子或用戶資料優先）
    if (store.getAll('projects').length > 0) return false;

    const reports = await fetchReports();
    if (reports.length === 0) return false;

    // 取最新 2 份週報解析同步
    let replaced = false;
    for (let i = 0; i < Math.min(2, reports.length); i++) {
      const content = await fetchReportContent(reports[i].filename);
      const parsed  = parseHistoricalReport(content, reports[i].filename);
      syncToStore(parsed, store, { replaceAll: i === 0 }); // 第一份清除舊資料
      replaced = true;
    }
    return replaced;
  } catch (e) {
    console.warn('[autoSync] 失敗:', e.message);
    return false;
  }
}

// ── 初始化 ─────────────────────────────────────────────────────
async function init() {
  await initApi();

  // 從 /api/weeks 取最新週次，作為所有瀏覽器的統一預設畫面
  const weeks = await listWeeks();
  if (weeks.length > 0) {
    const latestLabel = weeks[0].weekLabel;      // 已依 weekLabel 降冪排列
    const data = await getWeekState(latestLabel);
    if (data) {
      _viewState    = data;
      _viewingLabel = latestLabel;
    }
    // Dashboard 預設顯示最新週，同步清除跨頁 sessionStorage
    // 避免其他頁面因殘留舊 session 載入過期週次
    setSessionWeek(null);
  }

  // 後端無資料時才 seed（避免種子快照污染 store）
  if (!_viewState) seedData();

  renderAll();
  await renderWeekNav();
}

// ── 渲染全部 ───────────────────────────────────────────────────
function renderAll() {
  renderKPIs();
  renderProjects('all');
  renderDecisions();
  updateWeekBadge();
}

// ── 週次 badge ──────────────────────────────────────────────────
function updateWeekBadge() {
  const label = _viewingLabel || store.currentWeekLabel();
  if (label) document.getElementById('weekBadge').textContent = label;
}

// ── KPI ─────────────────────────────────────────────────────────
function renderKPIs() {
  const healthEl   = document.getElementById('kpiHealth');
  const healthCard = healthEl.closest('.kpi-card');

  let onTrackPct, onTrack, atRisk, behind, paused, total, needAttn, overdue;

  const snap = _displaySnap();
  if (snap) {
    // 歷史模式：從快照取 KPI
    onTrackPct = snap.onTrackPct || 0;
    atRisk     = snap.atRiskCount || 0;
    behind     = snap.behindCount || 0;
    paused     = 0;
    total      = snap.totalProjects || 0;
    onTrack    = total - atRisk - behind;
    needAttn   = atRisk + behind;
  } else {
    // 本週模式：從 store 即時計算
    const s  = store.stats();
    onTrackPct = s.onTrackPct;
    onTrack    = s.onTrackProjects;
    atRisk     = s.atRiskProjects;
    behind     = s.behindProjects;
    paused     = s.pausedProjects;
    total      = s.totalProjects;
    needAttn   = atRisk + behind;
  }

  // 逾期 Actions：
  //   歷史模式優先 → 用快照預存 overdueActions（與當時一致）
  //   快照無此欄位  → 以快照 weekStart 為基準日計算（而非今日）
  //   本週模式      → 依今日日期即時計算
  if (snap && snap.overdueActions !== undefined) {
    overdue = snap.overdueActions;
  } else {
    const _refDate = snap?.weekStart ?? new Date().toISOString().split('T')[0];
    const _actions = _viewState ? (_viewState.actions || []) : store.getAll('actions');
    overdue = _actions.filter(a => a.dueDate && a.dueDate < _refDate && a.status !== 'done').length;
  }

  document.getElementById('kpiHealth').textContent    = `${onTrackPct}%`;
  document.getElementById('kpiHealthSub').textContent =
    `${onTrack} 正常 / ${atRisk} 風險 / ${behind} 落後${paused ? ` / ${paused} 暫緩` : ''}`;
  document.getElementById('kpiTotal').textContent     = total;
  document.getElementById('kpiTotalSub').textContent  = `${behind} 落後 / ${paused} 暫緩`;
  document.getElementById('kpiRisks').textContent     = needAttn;
  document.getElementById('kpiRisksSub').textContent  = `${atRisk} At Risk / ${behind} 落後`;
  document.getElementById('kpiRisksCard').className   =
    `kpi-card ${needAttn === 0 ? 'kpi-ok' : needAttn <= 3 ? 'kpi-warn' : 'kpi-bad'}`;
  document.getElementById('kpiActions').textContent   = overdue;
  document.getElementById('kpiActionsSub').textContent =
    overdue > 0 ? `${overdue} 項已逾期` : '無逾期項目';
  document.getElementById('kpiActionsCard').className =
    `kpi-card ${overdue === 0 ? 'kpi-ok' : overdue <= 3 ? 'kpi-warn' : 'kpi-bad'}`;
  healthCard.className =
    `kpi-card ${onTrackPct >= 80 ? 'kpi-ok' : onTrackPct >= 60 ? 'kpi-warn' : 'kpi-bad'}`;
}

// ── 專案列表 ────────────────────────────────────────────────────
let currentFilter     = 'all';
let currentTeamFilter = 'all';

function renderProjects(filter) {
  if (filter !== undefined) currentFilter = filter;
  const all = _displayProjects();
  let list = currentFilter === 'all' ? all : all.filter(p => p.status === currentFilter);
  if (currentTeamFilter !== 'all') list = list.filter(p => p.team === currentTeamFilter);
  const el = document.getElementById('projectList');
  document.getElementById('projectCount').textContent = `${list.length} 個專案`;

  if (list.length === 0) {
    el.innerHTML = `<div class="empty-state">
      <span class="empty-state__icon">🎉</span>
      <p class="empty-state__msg">此狀態無專案</p>
    </div>`;
    return;
  }

  const TEAM_NAMES = {
    'media-agent':'Media Agent','learnmode':'LearnMode',
    'chuangzaoli':'創造栗','tv-solution':'TV Solution','healthcare':'Healthcare',
    'org-mgmt':'組織管理'
  };

  const allActions = _viewState ? (_viewState.actions || []) : store.getAll('actions');
  function effectiveProgress(p) {
    if (p.progressMode !== 'auto') return p.progress ?? 0;
    const acts = allActions.filter(a => a.project === p.name);
    if (acts.length === 0) return p.progress ?? 0;
    return Math.round(acts.filter(a => a.status === 'done').length / acts.length * 100);
  }

  el.innerHTML = list.map(p => {
    const pct      = effectiveProgress(p);
    const isAuto   = p.progressMode === 'auto';
    const barColor = p.status === 'on-track' ? 'var(--color-success)' : p.status === 'at-risk' ? 'var(--color-warning)' : p.status === 'paused' ? 'var(--color-text-tertiary)' : 'var(--color-danger)';
    const overdue  = p.targetDate && isOverdue(p.targetDate);
    return `
    <div class="project-row project-row--${p.status}" data-id="${p.id}" onclick="toggleDetail('${p.id}')">
      <div class="project-row__dot project-row__dot--${p.status}"></div>
      <div class="project-row__name">${p.name}</div>
      <span class="badge badge-neutral text-xs">${TEAM_NAMES[p.team] || p.team}</span>
      ${overdue ? '<span class="badge badge-danger text-xs">逾期</span>' : ''}
      <div class="project-row__progress-wrap">
        <div class="project-row__progress-bar">
          <div class="project-row__progress-fill" style="width:${pct}%;background:${barColor}"></div>
        </div>
        <div class="project-row__progress-pct">${pct}%${isAuto ? '<span title="依 Actions 自動計算" style="font-size:10px;margin-left:2px;opacity:.7;">🤖</span>' : ''}</div>
      </div>
    </div>
    <div class="project-row__detail" id="detail-${p.id}">
      ${p.weekDone ? `<p><strong>本週完成：</strong>${p.weekDone}</p>` : ''}
      ${p.blockers  ? `<p><strong>阻塞：</strong><span style="color:var(--color-danger)">${p.blockers}</span></p>` : ''}
      <p><strong>負責人：</strong>${p.owner || '—'}　<strong>目標日期：</strong>${formatDate(p.targetDate)}
      ${isAuto ? `　<span class="text-xs text-secondary">🤖 完成率依 Actions 計算</span>` : ''}</p>
    </div>`;
  }).join('');
}

window.toggleDetail = function(id) {
  const el = document.getElementById(`detail-${id}`);
  el?.classList.toggle('open');
};

// ── 需決策事項 ──────────────────────────────────────────────────
function renderDecisions() {
  const allRisks = _displayRisks();
  const risks = allRisks.filter(r => r.level === 'high' && r.status !== 'closed');
  const el = document.getElementById('decisionList');

  if (risks.length === 0) {
    el.innerHTML = `<div class="empty-state">
      <span class="empty-state__icon">✅</span>
      <p class="empty-state__msg">本週無高風險決策事項</p>
    </div>`;
    return;
  }

  el.innerHTML = risks.slice(0, 5).map(r => `
    <div class="decision-card">
      <div class="decision-card__title">${r.description.substring(0,60)}${r.description.length>60?'…':''}</div>
      <div class="decision-card__meta">
        ${renderBadge('high')} &nbsp;
        <span>${r.project || '—'}</span> &nbsp;
        <span>負責：${r.owner || '—'}</span>
        ${r.dueDate ? `&nbsp; <span>截止：${formatDate(r.dueDate)}</span>` : ''}
      </div>
    </div>`).join('');
}

// ── 篩選 tabs ───────────────────────────────────────────────────
document.getElementById('statusFilter').addEventListener('click', e => {
  const btn = e.target.closest('.tab-btn');
  if (!btn) return;
  document.querySelectorAll('#statusFilter .tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderProjects(btn.dataset.filter);
});

document.getElementById('teamFilter').addEventListener('change', function() {
  currentTeamFilter = this.value;
  renderProjects();
});

// ── 週次選擇器 ─────────────────────────────────────────────────
async function renderWeekNav() {
  const weeks = await listWeeks();
  if (weeks.length === 0) return;

  const navBar     = document.getElementById('weekNavBar');
  const sel        = document.getElementById('weekSelect');
  const meta       = document.getElementById('weekNavMeta');
  const latestLabel = weeks[0].weekLabel;           // API 最新週次，與 localStorage 無關

  navBar.style.display = 'flex';

  // 組裝 option 清單（最新在最上方，標示「最新」）
  sel.innerHTML = weeks.map((w, i) => {
    const label = i === 0 ? `${w.weekLabel}（最新）` : w.weekLabel;
    const selected = w.weekLabel === (_viewingLabel || latestLabel) ? 'selected' : '';
    return `<option value="${w.weekLabel}" ${selected}>${label}</option>`;
  }).join('');

  // 顯示目前選定週次的摘要
  const cur = weeks.find(w => w.weekLabel === (_viewingLabel || latestLabel)) || weeks[0];
  if (cur) meta.textContent = `${cur.projectCount} 個專案 ｜ 健康度 ${cur.onTrackPct}%`;
}

// ── 切換週次 ────────────────────────────────────────────────────
window.loadWeekView = async function(weekLabel) {
  if (weekLabel === _viewingLabel) return;   // 已在此週，不重載

  const data = await getWeekState(weekLabel);
  if (!data) { toast(`找不到 ${weekLabel} 的歷史資料`, 'error'); return; }

  _viewState    = data;
  _viewingLabel = weekLabel;

  // 判斷是否為「最新週次」（API weeks[0]）
  const weeks = await listWeeks();
  const isLatest = weeks.length > 0 && weekLabel === weeks[0].weekLabel;

  // 同步跨頁 sessionStorage：其他頁面 (actions/milestones/input) 切到同一週次
  setSessionWeek(isLatest ? null : weekLabel);

  const snap = (data.snapshots || []).find(s => s.weekLabel === weekLabel)
             || (data.snapshots || []).slice(-1)[0];

  // 最新週次：隱藏 banner；歷史週次：顯示 banner
  const banner = document.getElementById('historyBanner');
  if (isLatest) {
    banner.style.display = 'none';
    document.querySelector('a[href="input.html"]')?.style.removeProperty('display');
  } else {
    const period = snap?.weekStart
      ? `${snap.weekStart.slice(5).replace('-','/')} 週`
      : weekLabel;
    banner.style.display = 'flex';
    document.getElementById('historyBannerText').textContent =
      `${weekLabel}（${period}）— ${(data.projects||[]).length} 個專案 | 唯讀`;
    document.querySelector('a[href="input.html"]')?.style.setProperty('display','none');
  }

  // 同步下拉選單與摘要
  const sel = document.getElementById('weekSelect');
  if (sel) sel.value = weekLabel;
  const metaEl = document.getElementById('weekNavMeta');
  if (metaEl) metaEl.textContent =
    `${(data.projects||[]).length} 個專案 ｜ 健康度 ${snap?.onTrackPct ?? '—'}%`;

  renderAll();
  renderWeekNav();
};

// ── 回到最新週次 ─────────────────────────────────────────────────
window.returnToCurrentWeek = async function() {
  setSessionWeek(null);
  const weeks = await listWeeks();
  if (weeks.length > 0) await loadWeekView(weeks[0].weekLabel);
};

// ── store:updated 事件 ─────────────────────────────────────────
window.addEventListener('store:updated', () => {
  if (!_viewState) renderAll();  // 歷史瀏覽中不因 store 更新而重繪
});

// ── API Key 按鈕 ───────────────────────────────────────────────
document.getElementById('btnApiKey').addEventListener('click', () => {
  // 簡化：導引到 report.html
  window.location.href = 'report.html#apikey';
});

// ── 歷史週報中心（V3 後端整合）────────────────────────────────
async function initArchive() {
  const available = await initApi();
  if (!available) return;

  document.getElementById('archiveSection').style.display = '';

  try {
    const reports = await fetchReports();
    const badge = document.getElementById('archiveBadge');
    const list  = document.getElementById('archiveList');

    badge.textContent = `${reports.length} 份週報`;

    if (reports.length === 0) {
      list.innerHTML = `<div class="empty-state"><span class="empty-state__icon">☁</span><p class="empty-state__msg">尚無雲端週報</p></div>`;
      return;
    }

    list.innerHTML = reports.map(r => `
      <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:0.5px solid var(--color-border-default);">
        <div>
          <span style="font-weight:500;font-size:13px;">${r.filename.replace('.md','')}</span>
          ${r.period ? `<span class="text-secondary text-xs" style="margin-left:8px;">${r.period}</span>` : ''}
        </div>
        <div style="display:flex;gap:8px;">
          ${r.date ? `<span class="badge badge--neutral">${r.date}</span>` : ''}
          <button class="btn btn-outline btn-sm" onclick="openReport('${r.filename}')">📖 閱讀</button>
          <a href="${downloadUrl(r.filename)}" class="btn btn-outline btn-sm" download>⬇ 下載</a>
          <button class="btn btn-ghost btn-sm" style="color:var(--color-danger);" onclick="removeReport('${r.filename}')">🗑</button>
        </div>
      </div>
    `).join('');
  } catch (err) {
    document.getElementById('archiveList').innerHTML = `<p class="text-secondary text-sm">載入失敗：${err.message}</p>`;
  }
}

// ── 刪除歷史週報 ───────────────────────────────────────────────
window.removeReport = async function(filename) {
  if (!window.confirm(`確定刪除週報「${filename}」？此操作無法還原。`)) return;
  try {
    await deleteReport(filename);
    toast(`🗑 已刪除 ${filename}`, 'success');
    initArchive();
  } catch (err) {
    toast(`刪除失敗：${err.message}`, 'error');
  }
};

// ── 週報匯入（MD 檔案）────────────────────────────────────────
function initImport() {
  const btn   = document.getElementById('btnImportMd');
  const input = document.getElementById('mdFileInput');

  btn.addEventListener('click', () => input.click());

  input.addEventListener('change', async () => {
    const file = input.files[0];
    if (!file) return;
    if (!file.name.endsWith('.md')) {
      toast('請選擇 .md 格式的週報檔案', 'error'); return;
    }

    btn.disabled = true;
    btn.textContent = '上傳中…';

    try {
      const content = await file.text();
      await saveReport(file.name, content);
      toast(`✅ 已匯入：${file.name}`, 'success');

      // 重新載入歷史列表
      await initArchive();

      // 自動同步新資料到 store
      const parsed = parseHistoricalReport(content, file.name);
      const counts = syncToStore(parsed, store, { replaceAll: false });
      if (counts.projects > 0) {
        toast(`同步 ${counts.projects} 個專案到儀表板`, 'info');
        renderAll();
      }
    } catch (e) {
      toast(`匯入失敗：${e.message}`, 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = '⬆ 匯入週報';
      input.value = '';
    }
  });
}

// ── 線上閱讀週報 ───────────────────────────────────────────────
let _markedReady = false;
async function _loadMarked() {
  if (_markedReady) return;
  await new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/marked@9/marked.min.js';
    s.onload = resolve; s.onerror = reject;
    document.head.appendChild(s);
  });
  _markedReady = true;
}

window.openReport = async function(filename) {
  try {
    await _loadMarked();
    const content = await fetchReportContent(filename);
    const html = window.marked.parse(content);
    const title = filename.replace('.md', '');

    modal(`
      <div class="modal__header">
        <span class="modal__title">📄 ${title}</span>
        <button class="modal__close" type="button">✕</button>
      </div>
      <div class="modal__body" style="max-height:75vh;overflow-y:auto;padding:var(--space-xl);">
        <div class="markdown-body" style="font-size:14px;line-height:1.8;">${html}</div>
      </div>
    `, { size: 'wide' });
  } catch (e) {
    toast(`載入失敗：${e.message}`, 'error');
  }
};

// ── 啟動 ───────────────────────────────────────────────────────
init();
initArchive();
initImport();
</script>
</body>
</html>
