<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Report — P&D Program Sync</title>
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <!-- marked.js for Markdown preview -->
  <script src="https://cdn.jsdelivr.net/npm/marked@9.0.0/marked.min.js"></script>
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="navbar__logo">
    <div class="navbar__logo-icon">P</div>
    <span>P&amp;D CENTER</span>
  </a>
  <span class="navbar__week-badge" id="weekBadge">W11</span>
  <div class="navbar__links">
    <a href="index.html"      class="navbar__link">Dashboard</a>
    <a href="input.html"      class="navbar__link">Quick Input</a>
    <a href="risks.html"      class="navbar__link">Risks</a>
    <a href="actions.html"    class="navbar__link">Action Items</a>
    <a href="milestones.html" class="navbar__link">Milestones</a>
    <a href="tracker.html"    class="navbar__link">Tracker</a>
    <a href="trends.html"     class="navbar__link">Trends</a>
    <a href="review.html"     class="navbar__link">Review</a>
    <a href="resources.html" class="navbar__link">Resources</a>
  </div>
  <div class="navbar__actions">
    <button class="btn btn-ghost btn-sm navbar__hamburger" id="navHamburger" aria-label="開啟選單" style="display:none;font-size:18px;padding:4px 8px;line-height:1;">☰</button>
  </div>
</nav>

<!-- V-3 修正：手機選單 -->
<div id="mobileNav" style="display:none;position:fixed;top:var(--navbar-height);left:0;right:0;z-index:99;background:var(--color-bg-primary);border-bottom:1px solid var(--color-border-default);box-shadow:var(--shadow-md);padding:var(--space-md) var(--space-lg);flex-direction:column;gap:4px;">
  <a href="index.html"      class="navbar__link" style="padding:8px var(--space-md);">Dashboard</a>
  <a href="input.html"      class="navbar__link" style="padding:8px var(--space-md);">Quick Input</a>
  <a href="risks.html"      class="navbar__link" style="padding:8px var(--space-md);">Risks</a>
  <a href="actions.html"    class="navbar__link" style="padding:8px var(--space-md);">Action Items</a>
  <a href="milestones.html" class="navbar__link" style="padding:8px var(--space-md);">Milestones</a>
  <a href="tracker.html"    class="navbar__link" style="padding:8px var(--space-md);">Tracker</a>
  <a href="trends.html"     class="navbar__link" style="padding:8px var(--space-md);">Trends</a>
  <a href="review.html"     class="navbar__link" style="padding:8px var(--space-md);">Review</a>
  <a href="resources.html"  class="navbar__link" style="padding:8px var(--space-md);">Resources</a>
</div>

<div class="page-container" style="padding-top:calc(var(--navbar-height) + var(--space-md));">
  <div class="three-col" style="grid-template-columns:260px 1fr;height:calc(100vh - var(--navbar-height) - 80px);">

    <!-- ── 左側：設定 ──────────────────────────────────────── -->
    <div class="sidebar-sticky stack" style="gap:var(--space-md);">

      <!-- 週次/彙整人 -->
      <div class="panel">
        <div class="panel__header">
          <span class="panel__title">報告設定</span>
        </div>
        <div class="panel__body stack-sm">
          <div class="inp-group">
            <label class="inp-label">週次</label>
            <select class="inp" id="weekSelect">
              <option value="">— 載入中 —</option>
            </select>
          </div>
          <div class="inp-group">
            <label class="inp-label">彙整人</label>
            <input type="text" class="inp" id="author" value="Kevin Chang">
          </div>
        </div>
      </div>

      <!-- V3：歷史週報同步 -->
      <div class="panel" id="historyPanel" style="display:none">
        <div class="panel__header">
          <span class="panel__title">📂 歷史週報資料</span>
          <span class="badge badge--info text-xs" id="historyStatus">偵測中…</span>
        </div>
        <div class="panel__body stack-sm">
          <p class="text-secondary text-xs">選擇要引入的歷史週報，資料將同步至系統各模組。</p>
          <div id="historyList" style="max-height:140px;overflow-y:auto;"></div>
          <button class="btn btn-outline btn-sm" id="btnSyncHistory" title="將歷史週報資料引入系統（專案/風險/Action/里程碑）">⬇ 引入至系統</button>
          <p class="text-tertiary" id="syncResult" style="font-size:11px;"></p>
        </div>
      </div>

      <!-- 格式選擇 + 匯出 -->
      <div class="panel">
        <div class="panel__header">
          <span class="panel__title">匯出與儲存</span>
        </div>
        <div class="panel__body stack-sm">
          <div style="display:flex;gap:var(--space-sm);">
            <select class="inp" id="exportFmt" style="flex:1; padding:4px 8px; font-size:var(--font-size-sm);">
              <option value="pdf">PDF (.pdf)</option>
              <option value="md">Markdown (.md)</option>
              <option value="docx">Word (.docx)</option>
            </select>
            <button class="btn btn-outline" id="btnExport" style="white-space:nowrap; padding:4px 12px;">⬇ 匯出</button>
          </div>
          <div class="divider"></div>
          <button class="btn btn-primary btn-sm" id="btnSaveDraft" style="width:100%;">💾 儲存草稿</button>
          <div style="display:flex;gap:var(--space-sm);">
            <button class="btn btn-ghost btn-sm" id="btnCopyMd" style="flex:1;">📋 複製 MD</button>
            <button class="btn btn-primary btn-sm" id="btnSaveCloud" style="flex:1; display:none;">☁ 儲存到雲端</button>
          </div>
        </div>
      </div>

    </div>

    <!-- ── 中間：Markdown 預覽 ─────────────────────────────── -->
    <div class="panel" style="overflow:hidden;display:flex;flex-direction:column;">
      <div class="panel__header">
        <span class="panel__title">週報預覽</span>
        <div style="display:flex;gap:var(--space-xs);">
          <button class="tab-btn active" id="tabPreview" onclick="switchTab('preview')">預覽</button>
          <button class="tab-btn" id="tabSource" onclick="switchTab('source')">原始 MD</button>
        </div>
      </div>
      <div style="flex:1;overflow-y:auto;" id="previewArea">
        <div class="md-preview" id="mdPreview">
          <div class="empty-state" style="min-height:300px;">
            <span class="empty-state__icon">📝</span>
            <p class="empty-state__msg">請切換至「原始 MD」頁籤貼上或輸入週報內容</p>
          </div>
        </div>
        <textarea class="inp" id="mdSource" style="display:none;width:100%;height:100%;min-height:400px;font-family:monospace;font-size:12px;border:none;border-radius:0;resize:none;padding:var(--space-xl) var(--space-2xl);"></textarea>
      </div>
    </div>

  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script type="module">
import { store }                   from './assets/js/store.js';
import { appInit }                 from './assets/js/app-init.js';
import { toast, btnLoading }       from './assets/js/ui.js';
import { toDocx, toPdf }           from './assets/js/export.js';
import { initApi, saveReport, isBackendAvailable, fetchReports, fetchReportContent, listWeeks } from './assets/js/api.js';
import { parseHistoricalReport, syncToStore } from './assets/js/parse-history.js';

// 歷史週報快取
let _historicalReports = [];   // [{ filename, content }]
let _selectedHistory   = new Set();

// 初始化後端連線偵測 + 歷史週報面板
initApi().then(async available => {
  const saveBtn = document.getElementById('btnSaveCloud');
  if (saveBtn) saveBtn.style.display = available ? '' : 'none';

  const panel = document.getElementById('historyPanel');
  if (!panel) return;

  if (!available) {
    document.getElementById('historyStatus').textContent = '後端未連線';
    return;
  }

  panel.style.display = '';
  try {
    const reports = await fetchReports();
    document.getElementById('historyStatus').textContent = `${reports.length} 份可用`;
    const list = document.getElementById('historyList');

    list.innerHTML = reports.map(r => `
      <label style="display:flex;align-items:center;gap:6px;padding:4px 0;cursor:pointer;border-bottom:0.5px solid var(--color-border-default);">
        <input type="checkbox" class="history-chk" value="${r.filename}" checked>
        <span style="font-size:12px;flex:1;">${r.filename.replace('.md','')}</span>
        <span class="badge badge--neutral" style="font-size:10px;">${r.date || r.period?.split('–')[0]?.trim() || ''}</span>
      </label>
    `).join('');

    // 預載所有報告內容
    for (const r of reports) {
      const content = await fetchReportContent(r.filename);
      _historicalReports.push({ filename: r.filename, content });
    }

    // 預設全選
    _selectedHistory = new Set(reports.map(r => r.filename));

    // 勾選變更
    list.addEventListener('change', e => {
      if (e.target.classList.contains('history-chk')) {
        if (e.target.checked) _selectedHistory.add(e.target.value);
        else _selectedHistory.delete(e.target.value);
      }
    });

  } catch (err) {
    document.getElementById('historyStatus').textContent = '載入失敗';
  }
});

// ── 同步歷史資料到 store ────────────────────────────────────
document.getElementById('btnSyncHistory')?.addEventListener('click', async () => {
  const selected = _historicalReports.filter(r => _selectedHistory.has(r.filename));
  if (selected.length === 0) { toast('請先勾選歷史週報', 'error'); return; }

  let totalCounts = { projects: 0, risks: 0, actions: 0, milestones: 0 };

  for (const r of selected) {
    const parsed = parseHistoricalReport(r.content, r.filename);
    const counts = syncToStore(parsed, store, { replaceAll: false });
    for (const k of Object.keys(counts)) totalCounts[k] += counts[k];
  }

  const msg = `✅ 已同步：${totalCounts.projects} 個專案、${totalCounts.risks} 筆風險、${totalCounts.actions} 筆行動、${totalCounts.milestones} 個里程碑`;
  document.getElementById('syncResult').textContent = msg;
  toast(msg, 'success');
});

(async () => {
  await appInit();
  // 動態填充週次下拉（從後端取最新清單）
  const weeks = await listWeeks();
  const sel = document.getElementById('weekSelect');
  if (weeks.length > 0) {
    sel.innerHTML = weeks.map(w =>
      `<option value="${w.weekStart}">${w.weekLabel} — ${w.weekStart.slice(5).replace('-','/')}</option>`
    ).join('');
    const firstLabel = weeks[0]?.weekLabel;
    if (firstLabel) document.getElementById('weekBadge').textContent = firstLabel;
  } else {
    sel.innerHTML = '<option value="">— 後端未連線 —</option>';
  }

  sel.addEventListener('change', () => {
    const selected = weeks.find(w => w.weekStart === sel.value);
    if (selected) document.getElementById('weekBadge').textContent = selected.weekLabel;
  });
})();

let currentMd = '';
let currentTab = 'preview';
let _isDirty = false;

// ── 渲染 Markdown ──────────────────────────────────────────────
function renderMdPreview(md) {
  document.getElementById('mdPreview').innerHTML = window.marked.parse(md);
  document.getElementById('mdSource').value = md;
}

// ── Tab 切換 ───────────────────────────────────────────────────
window.switchTab = function(tab) {
  currentTab = tab;
  document.getElementById('mdPreview').style.display  = tab === 'preview' ? '' : 'none';
  document.getElementById('mdSource').style.display   = tab === 'source'  ? '' : 'none';
  document.getElementById('tabPreview').classList.toggle('active', tab === 'preview');
  document.getElementById('tabSource').classList.toggle('active', tab === 'source');
};

// ── 匯出 ───────────────────────────────────────────────────────
document.getElementById('btnExport').addEventListener('click', async () => {
  if (!currentMd) { toast('請先輸入或貼上週報內容', 'error'); return; }
  const fmt      = document.getElementById('exportFmt').value;
  const weekLabel = document.getElementById('weekBadge').textContent;
  const author   = document.getElementById('author').value.trim();

  if (fmt === 'md') {
    const blob = new Blob([currentMd], { type: 'text/markdown' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `PnD_Weekly_${weekLabel}.md`;
    a.click();
    toast('✅ Markdown 已下載', 'success');
  } else if (fmt === 'docx') {
    toast('⏳ 生成 DOCX 中…', 'info');
    await toDocx(currentMd, { weekLabel, author });
    toast('✅ DOCX 已下載', 'success');
  } else if (fmt === 'pdf') {
    toast('⏳ 生成 PDF 中（可能需要數秒）…', 'info');
    await toPdf(currentMd, { weekLabel, author });
    toast('✅ PDF 已下載', 'success');
  }
});

document.getElementById('btnCopyMd').addEventListener('click', async () => {
  if (!currentMd) { toast('請先輸入或貼上週報內容', 'error'); return; }
  try {
    await navigator.clipboard.writeText(currentMd);
    toast('✅ 已複製 Markdown', 'success');
  } catch {
    toast('複製失敗，請手動選取', 'error');
  }
});

// ── 儲存到雲端（V3）──────────────────────────────────────────
document.getElementById('btnSaveCloud')?.addEventListener('click', async (e) => {
  if (!currentMd) { toast('請先輸入或貼上週報內容', 'error'); return; }
  if (!isBackendAvailable()) { toast('後端未連線', 'error'); return; }

  const weekStart = document.getElementById('weekSelect').value.replace(/-/g, '');
  const filename  = `Pgm_Weekly_Report_${weekStart}.md`;
  const reset = btnLoading(e.currentTarget, '⏳ 上傳中…');

  try {
    const result = await saveReport(filename, currentMd);
    toast(`✅ 已儲存到雲端：${result.filename}`, 'success');
  } catch (err) {
    toast(`❌ 儲存失敗：${err.message}`, 'error');
  } finally {
    reset();
  }
});

// ── 儲存草稿 ───────────────────────────────────────────────────
function saveDraft() {
  if (!currentMd) { toast('請先輸入或貼上週報內容', 'error'); return; }
  const weekStart = document.getElementById('weekSelect').value;
  const author    = document.getElementById('author').value.trim();
  store.newDraftVersion(weekStart, currentMd, { author });
  _isDirty = false;
  toast('💾 草稿已儲存', 'success');
}
document.getElementById('btnSaveDraft').addEventListener('click', saveDraft);

// ── 離頁警告（有未儲存內容時）────────────────────────────────
window.addEventListener('beforeunload', (e) => {
  if (_isDirty && currentMd) {
    e.preventDefault();
    e.returnValue = '';
  }
});

// ── mdSource 同步到 preview ────────────────────────────────────
document.getElementById('mdSource').addEventListener('input', function() {
  currentMd = this.value;
  _isDirty = true;
  if (currentTab === 'source') {
    document.getElementById('mdPreview').innerHTML = window.marked.parse(currentMd);
  }
});
</script>

<script>
// V-3 修正：手機漢堡選單
(function() {
  var btn = document.getElementById('navHamburger');
  var menu = document.getElementById('mobileNav');
  if (!btn || !menu) return;
  btn.addEventListener('click', function() {
    var open = menu.style.display === 'flex';
    menu.style.display = open ? 'none' : 'flex';
    btn.textContent = open ? '☰' : '✕';
    btn.setAttribute('aria-label', open ? '開啟選單' : '關閉選單');
  });
  menu.querySelectorAll('a').forEach(function(a) {
    a.addEventListener('click', function() {
      menu.style.display = 'none';
      btn.textContent = '☰';
      btn.setAttribute('aria-label', '開啟選單');
    });
  });
})();
</script>
</body>
</html>
