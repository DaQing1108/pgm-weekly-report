<!-- V-3 修正：手機選單 -->
<div id="mobileNav" style="display:none;position:fixed;top:var(--navbar-height);left:0;right:0;z-index:99;background:var(--color-bg-primary);border-bottom:1px solid var(--color-border-default);box-shadow:var(--shadow-md);padding:var(--space-md) var(--space-lg);flex-direction:column;gap:4px;">
  <a href="index.html"      class="navbar__link" style="padding:8px var(--space-md);">Dashboard</a>
  <a href="input.html"      class="navbar__link" style="padding:8px var(--space-md);">Quick Input</a>
  <a href="risks.html"      class="navbar__link" style="padding:8px var(--space-md);">Risks</a>
  <a href="actions.html"    class="navbar__link" style="padding:8px var(--space-md);">Action Items</a>

  <a href="resources.html"  class="navbar__link" style="padding:8px var(--space-md);">Resources</a>
</div>

<!-- 週次選擇器 -->
<div id="weekSelectorStrip" style="background:var(--color-bg-secondary);border-bottom:1px solid var(--color-border-default);padding:6px 24px;display:flex;align-items:center;gap:12px;font-size:13px;">
  <span style="color:var(--color-text-secondary);">週次：</span>
  <select class="inp" id="weekSelect" style="width:180px;padding:4px 8px;font-size:13px;">
    <option value="">— 載入中 —</option>
  </select>
  <span id="historyBadge" style="display:none;background:var(--color-warning-bg,#fff8e1);border:1px solid var(--color-warning,#e4a23c);border-radius:4px;padding:2px 8px;font-size:12px;">📅 歷史瀏覽（唯讀）</span>
</div>

<div class="page-container">
  <div class="page-header">
    <div class="page-header__left">
      <!-- V-14 修正：加返回 Dashboard 路徑連結 -->
      <div style="font-size:12px;color:var(--color-text-tertiary);margin-bottom:4px;">
        <a href="index.html" style="color:var(--color-text-tertiary);text-decoration:none;" onmouseover="this.style.color='var(--color-info)'" onmouseout="this.style.color='var(--color-text-tertiary)'">← Dashboard</a>
        <span style="margin:0 4px;">›</span>
        <span>Action Items</span>
      </div>
      <h1 class="page-header__title">Action Items</h1>
      <p class="page-header__sub">追蹤所有行動事項的執行狀態</p>
    </div>
    <div class="page-header__right">
      <!-- 新增：Loop 匯入按鈕與隱藏的 file input -->
      <button class="btn btn-outline btn-sm" id="btnImportLoop" title="匯入由 Python 腳本萃取的 Loop 任務 JSON 檔" style="margin-right: 8px;">🔄 從 Loop 匯入</button>
      <input type="file" id="loopFileInput" accept=".json" style="display:none;">
      
      <!-- V-11 修正：批次完成按鈕加 title 說明，並調整樣式提升可見度 -->
      <button class="btn btn-primary btn-sm" id="btnMarkDone" title="將所有「進行中」Action 批次標記為完成（可選擇後復原）">✓ 批次完成</button>
    </div>
  </div>

  <!-- 完成率進度條 -->
  <div class="panel" style="margin-bottom:var(--space-xl);">
    <div class="panel__body" style="padding:var(--space-lg) var(--space-xl);">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--space-sm);">
        <span class="font-600">整體完成率</span>
        <div id="actionSummary" class="text-sm text-secondary"></div>
      </div>
      <div class="progress-bar" style="height:12px;">
        <div class="progress-bar__fill" id="completionBar" style="width:0%;"></div>
      </div>
      <div class="progress-bar__label" id="completionLabel">
        <span>0 / 0 項已完成</span>
        <span id="overdueCount" style="color:var(--color-danger)"></span>
      </div>
    </div>
  </div>

  <!-- 篩選列 -->
  <div class="panel" style="margin-bottom:var(--space-xl);">

      <input type="text" class="inp" id="filterKeyword" placeholder="🔍 搜尋任務名稱或專案..." style="flex:1; min-width: 200px;">
      <select class="inp owner-select" id="filterOwner" style="width:160px;">
        <option value="">👤 所有負責人</option>
      </select>
      <label style="display:flex; align-items:center; gap:var(--space-xs); cursor:pointer; font-size:var(--font-size-sm); user-select:none;">
        <input type="checkbox" id="filterHideDone" checked>
        隱藏已完成
      </label>
    </div>
  </div>

  <!-- 行動清單列表 (橫式展開) -->
  <div style="display:flex; flex-direction:column; gap:var(--space-xl);" id="actionPanels"></div>

</div>

<div class="toast-container" id="toastContainer"></div>

<script type="module">
import { store }   from './assets/js/store.js';
import { appInit, setSessionWeek } from './assets/js/app-init.js';
import { listWeeks } from './assets/js/api.js';
import { toast, renderBadge, formatDate, generateId, modal, isOverdue, confirm } from './assets/js/ui.js';

(async () => {
  const currentLabel = await appInit();
  // ── 週次選擇器 ──────────────────────────────────────────────
  const weeks = await listWeeks();
  const sel = document.getElementById('weekSelect');
  if (weeks.length > 0) {
    sel.innerHTML = weeks.map(w =>
      `<option value="${w.weekLabel}" ${w.weekLabel === currentLabel ? 'selected' : ''}>${w.weekLabel} — ${w.weekStart.slice(5).replace('-','/')}</option>`
    ).join('');
    sel.addEventListener('change', function() {
      const val = this.value;
      if (!val) return;
      setSessionWeek(val === weeks[0].weekLabel ? null : val);
      location.reload();
    });
  } else {
    sel.innerHTML = '<option value="">— 後端未連線 —</option>';
  }
  // ── 歷史唯讀模式 ────────────────────────────────────────────
  if (window._appInitIsHistoryMode) {
    document.getElementById('historyBadge').style.display = '';
    document.body.classList.add('is-history-readonly');
  }
})();

const CATEGORIES = [
  { id: 'technical', label: '⚙️ 技術',  color: 'var(--color-info)'    },
  { id: 'business',  label: '📋 業務',  color: 'var(--color-warning)' },
  { id: 'resource',  label: '👥 資源',  color: 'var(--color-success)' },
];

const STATUS_CYCLE = ['pending', 'in-progress', 'done', 'blocked'];

function renderAll() {
  renderProgressBar();
  renderPanels();
}

// ── 進度條 ─────────────────────────────────────────────────────
function renderProgressBar() {
  const all   = store.getAll('actions');
  const done  = all.filter(a => a.status === 'done').length;
  const total = all.length;
  const pct   = total ? Math.round((done / total) * 100) : 0;
  const today = new Date().toISOString().split('T')[0];
  const overdue = all.filter(a => a.dueDate && a.dueDate < today && a.status !== 'done').length;

  document.getElementById('completionBar').style.width = `${pct}%`;
  document.getElementById('completionBar').style.background =
    pct >= 80 ? 'var(--color-success)' : pct >= 50 ? 'var(--color-warning)' : 'var(--color-danger)';
  document.getElementById('completionLabel').innerHTML =
    `<span>${done} / ${total} 項已完成（${pct}%）</span>
     ${overdue > 0 ? `<span style="color:var(--color-danger)">⚠️ ${overdue} 項逾期</span>` : '<span style="color:var(--color-success)">無逾期</span>'}`;
  document.getElementById('actionSummary').textContent =
    `待辦 ${all.filter(a=>a.status==='pending').length} / 進行中 ${all.filter(a=>a.status==='in-progress').length} / 阻塞 ${all.filter(a=>a.status==='blocked').length}`;
}

// ── 篩選狀態 ───────────────────────────────────────────────────
let _filterKeyword = '';
let _filterOwner = '';
let _filterHideDone = true;

document.getElementById('filterKeyword')?.addEventListener('input', e => { _filterKeyword = e.target.value.toLowerCase(); renderPanels(); });
document.getElementById('filterOwner')?.addEventListener('change', e => { _filterOwner = e.target.value; renderPanels(); });
document.getElementById('filterHideDone')?.addEventListener('change', e => { _filterHideDone = e.target.checked; renderPanels(); });

window.toggleAddForm = function(catId) {
  const form = document.getElementById(`addForm-${catId}`);
  if (form) {
    const isHidden = form.style.display === 'none';
    form.style.display = isHidden ? 'block' : 'none';
    if (isHidden) document.getElementById(`newTask-${catId}`)?.focus();
  }
};

// ── 三欄面板 ───────────────────────────────────────────────────
function renderPanels() {
  let all = store.getAll('actions');
  // 依 sortIndex 排序，若無則排後面
  all.sort((a, b) => (a.sortIndex ?? 9999) - (b.sortIndex ?? 9999));
  
  const today = new Date().toISOString().split('T')[0];
  const el    = document.getElementById('actionPanels');

  el.innerHTML = CATEGORIES.map(cat => {
    let items = all.filter(a => a.category === cat.id);
    const doneCount  = items.filter(a => a.status === 'done').length;
    const totalCount = items.length;

    // Apply Filters
    items = items.filter(a => {
      if (_filterHideDone && a.status === 'done') return false;
      if (_filterOwner && a.owner !== _filterOwner) return false;
      if (_filterKeyword) {
        const text = (a.task + ' ' + (a.project||'')).toLowerCase();
        if (!text.includes(_filterKeyword)) return false;
      }
      return true;
    });

    const rows = items.map(a => {
      const isDone = a.status === 'done';
      const late = !isDone && isOverdue(a.dueDate);
      let urgent = false;
      if (!late && a.dueDate && !isDone) {
        const diff = (new Date(a.dueDate) - new Date(today)) / 86400000;
        urgent = diff >= 0 && diff <= 3;
      }
      let rowClass = late ? 'a-late overdue' : urgent ? 'a-urgent' : '';
      if (isDone) rowClass += ' is-done';
      
      const dueStyle = late ? 'color:var(--color-danger);font-weight:600;' : urgent ? 'color:var(--color-warning);font-weight:600;' : '';
      const icon = late ? ' 🔥' : urgent ? ' ⏳' : '';

      return `
        <div class="action-row ${rowClass.trim()}" data-id="${a.id}" id="arow-${a.id}">
          <div class="action-row__drag">⋮⋮</div>
          <div class="action-row__task inline-edit">
            <span>${a.task}</span>
            ${a.project ? `<span class="badge badge-neutral" style="margin-left:4px;font-size:10px;">${a.project.substring(0,15)}</span>` : ''}
          </div>
          <div class="action-row__owner text-xs text-secondary inline-edit">
            <span class="avatar" style="width:18px;height:18px;font-size:9px;margin-right:4px;">${a.owner ? a.owner.substring(0,1).toUpperCase() : '?'}</span>
            ${a.owner || '—'}
          </div>
          <div class="action-row__due text-xs inline-edit" style="${dueStyle}">
            ${a.dueDate ? formatDate(a.dueDate) : '—'}
            ${icon}
          </div>
          <div style="display:flex;align-items:center;gap:var(--space-xs);">
            <span class="badge ${statusBadgeCls(a.status)}"
                  style="cursor:pointer; transition: transform 0.15s; display:inline-block;"
                  onclick="cycleStatus('${a.id}')"
                  onmousedown="this.style.transform='scale(0.95)'"
                  onmouseup="this.style.transform='scale(1)'"
                  onmouseleave="this.style.transform='scale(1)'"
                  title="點擊切換 → ${statusLabel(STATUS_CYCLE[(STATUS_CYCLE.indexOf(a.status)+1)%STATUS_CYCLE.length])}">
              ${statusLabel(a.status)}
            </span>
            <button class="btn btn-ghost btn-sm" onclick="editAction('${a.id}')" style="padding:4px 8px;color:var(--color-text-tertiary);" title="編輯">✏️</button>
            <button class="btn btn-ghost btn-sm" onclick="deleteAction('${a.id}')" style="padding:4px 8px;color:var(--color-text-tertiary);" title="刪除">✕</button>
          </div>
        </div>`;
    }).join('');

    // Inline 新增表單 (置頂且預設隱藏)
    const addForm = `
      <div id="addForm-${cat.id}" style="display:none; margin-bottom:var(--space-md); padding-bottom:var(--space-md); border-bottom:1px solid var(--color-border-default);">
        <div class="inline-form">
          <input type="text" class="inp" id="newTask-${cat.id}" placeholder="新增 ${cat.label} 行動…">
          <select class="inp owner-select" id="newOwner-${cat.id}" style="width:110px;">
            <option value="">負責人</option>
          </select>
          <input type="date" class="inp" id="newDue-${cat.id}" style="width:130px;" title="截止日期">
          <button class="btn btn-primary btn-sm" onclick="addAction('${cat.id}')">+</button>
        </div>
        <div class="inp-error" id="newTaskError-${cat.id}" style="display:none;">請輸入行動任務</div>
      </div>`;

    return `
      <div class="panel">
        <div class="panel__header" style="border-left:3px solid ${cat.color}; display:flex; justify-content:space-between; align-items:center;">
          <div>
            <span class="panel__title">${cat.label}</span>
            <span class="badge badge-neutral">${doneCount}/${totalCount}</span>
          </div>
          <button class="btn btn-ghost btn-sm" onclick="toggleAddForm('${cat.id}')" title="新增行動">＋ 新增</button>
        </div>
        <div class="panel__body" style="padding:var(--space-md) var(--space-lg);">
          ${addForm}
          <div id="sortList-${cat.id}" class="sortable-list" data-cat="${cat.id}">
            ${rows || `<p class="text-sm text-secondary">尚無符合條件的行動項</p>`}
          </div>
        </div>
      </div>`;
  }).join('');
  
  populateOwnerSelects();
  initSortable();
}

// ── 初始化 SortableJS ──────────────────────────────────────────
function initSortable() {
  document.querySelectorAll('.sortable-list').forEach(list => {
    // 若畫面為篩選狀態，暫不允許拖曳排序以免順序錯亂
    const isFiltered = _filterKeyword !== '' || _filterOwner !== '' || _filterHideDone === true;
    
    new Sortable(list, {
      group: 'actions',
      handle: '.action-row__drag',
      animation: 150,
      disabled: isFiltered, 
      onEnd: function (evt) {
        if (isFiltered) {
          toast('搜尋或過濾狀態下無法儲存排序', 'warning');
          return;
        }
        const itemEl = evt.item;
        const newCatId = evt.to.getAttribute('data-cat');
        const id = itemEl.getAttribute('data-id');
        
        // 取得同列表的所有 ID 順序
        const allIdsInList = Array.from(evt.to.children)
                                  .map(el => el.getAttribute('data-id'))
                                  .filter(Boolean);
        
        let a = store.getById('actions', id);
        if (a) {
          a.category = newCatId;
          store.save('actions', a);
        }
        
        // 重新分配這個 category 底下所有 action 的 sortIndex
        const allActions = store.getAll('actions');
        let currentSortIndex = 0;
        
        allIdsInList.forEach(actionId => {
          let act = allActions.find(x => x.id === actionId);
          if (act) {
            act.sortIndex = currentSortIndex++;
            store.save('actions', act);
          }
        });
        
        renderProgressBar(); // Update progress bar if category changed
      }
    });
  });
  
  if (_filterKeyword !== '' || _filterOwner !== '' || _filterHideDone === true) {
    document.querySelectorAll('.action-row__drag').forEach(el => {
      el.style.opacity = '0.2';
      el.style.cursor = 'not-allowed';
      el.title = '篩選模式下停用拖曳排序';
    });
  }
}

function statusBadgeCls(status) {
  return { 'done':'badge-success', 'in-progress':'badge-info', 'pending':'badge-neutral', 'blocked':'badge-danger' }[status] || 'badge-neutral';
}

function statusLabel(status) {
  return { 'done':'✅ 完成', 'in-progress':'🔄 進行中', 'pending':'⏳ 待辦', 'blocked':'🚫 阻塞' }[status] || status;
}

// ── 狀態循環（inline 點擊）──────────────────────────────────────
window.cycleStatus = function(id) {
  const a = store.getById('actions', id);
  if (!a) return;
  const idx = STATUS_CYCLE.indexOf(a.status);
  const next = STATUS_CYCLE[(idx + 1) % STATUS_CYCLE.length];
  store.save('actions', { ...a, status: next });
  
  // 為了保留動畫過渡效果，只更新 DOM，若有影響到 Filter (例如從未完成變完成且 Filter 開著)，則重新 renderAll
  const row = document.getElementById(`arow-${id}`);
  if (row) {
    if (next === 'done') row.classList.add('is-done');
    else row.classList.remove('is-done');
    
    // 如果隱藏已完成被開啟，且狀態變為 done，則延遲 0.3s 後重新渲染以讓動畫播完
    if (_filterHideDone && next === 'done') {
      setTimeout(() => renderAll(), 300);
    } else {
      renderAll();
    }
  } else {
    renderAll();
  }
};

// V-5 修正：預設截止日期（兩週後的周五）
function _defaultDueDate() {
  const d = new Date();
  d.setDate(d.getDate() + 14);
  const day = d.getDay();
  const diff = day <= 5 ? 5 - day : 6; // 找到最近的周五
  d.setDate(d.getDate() + (day === 5 ? 0 : diff));
  return d.toISOString().split('T')[0];
}

// V-5 修正：新增 Action 時預設日期為兩週後的周五
window.addAction = function(catId) {
  const taskEl  = document.getElementById(`newTask-${catId}`);
  const task    = taskEl?.value.trim();
  const owner   = document.getElementById(`newOwner-${catId}`)?.value;
  const dueEl   = document.getElementById(`newDue-${catId}`);
  const due     = dueEl?.value || _defaultDueDate();
  const errEl   = document.getElementById(`newTaskError-${catId}`);
  // V-2 修正：inline 驗證錯誤顯示
  if (!task) {
    taskEl?.classList.add('inp--error');
    if (errEl) errEl.style.display = '';
    taskEl?.focus();
    return;
  }
  taskEl?.classList.remove('inp--error');
  if (errEl) errEl.style.display = 'none';

  store.save('actions', {
    id: generateId(),
    category: catId,
    task, owner: owner || '',
    dueDate: due || '',
    status: 'pending',
    weekStart: new Date().toISOString().split('T')[0],
  });
  toast('✅ 已新增行動', 'success');
};

// ── 刪除 ───────────────────────────────────────────────────────
// U-1/U-43 修正：styled confirm + undo toast（5 秒內可復原）
window.deleteAction = async function(id) {
  const a = store.getById('actions', id);
  if (!a) return;
  const ok = await confirm(`確定刪除此 Action？\n\n「${a.task}」`, '刪除');
  if (!ok) return;
  store.delete('actions', id);
  toast('已刪除', 'success', 5000, {
    onUndo: () => { store.save('actions', a); toast('已復原', 'info'); },
  });
};

// ── 編輯 Action（含變更專案）───────────────────────────────────
window.editAction = function(id) {
  const a = store.getById('actions', id);
  if (!a) return;

  const members  = store.sortBy('members', 'name', 'asc');

  // 從 Dashboard 專案清單動態載入
  const allProjects = store.getAll('projects');
  const projOpts = `<option value="">— 無 —</option>` +
    allProjects.map(p => `<option value="${p.name}" ${a.project === p.name ? 'selected' : ''}>${p.name}</option>`).join('');

  const ownerOpts = `<option value="">— 選擇 —</option>` +
    members.map(m => `<option value="${m.name}" ${a.owner === m.name ? 'selected' : ''}>${m.name}</option>`).join('');

  const catOpts = CATEGORIES.map(c =>
    `<option value="${c.id}" ${a.category === c.id ? 'selected' : ''}>${c.label}</option>`
  ).join('');

  const statusOpts = [
    { v:'pending',     l:'⏳ 待辦'   },
    { v:'in-progress', l:'🔄 進行中' },
    { v:'done',        l:'✅ 完成'   },
    { v:'blocked',     l:'🚫 阻塞'   },
  ].map(s => `<option value="${s.v}" ${a.status === s.v ? 'selected' : ''}>${s.l}</option>`).join('');

  const { close, el } = modal(`
    <div class="modal__header">
      <span class="modal__title">編輯 Action</span>
      <button class="modal__close" type="button">✕</button>
    </div>
    <div class="modal__body">
      <div class="stack">
        <div class="inp-group">
          <label class="inp-label">任務名稱</label>
          <input class="inp" id="eTask" value="${a.task.replace(/"/g,'&quot;')}" placeholder="任務描述">
        </div>
        <div class="inp-group">
          <label class="inp-label">🔗 關聯專案</label>
          <select class="inp" id="eProject">${projOpts}</select>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-md);">
          <div class="inp-group">
            <label class="inp-label">分類</label>
            <select class="inp" id="eCategory">${catOpts}</select>
          </div>
          <div class="inp-group">
            <label class="inp-label">狀態</label>
            <select class="inp" id="eStatus">${statusOpts}</select>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-md);">
          <div class="inp-group">
            <label class="inp-label">負責人</label>
            <select class="inp" id="eOwner">${ownerOpts}</select>
          </div>
          <div class="inp-group">
            <label class="inp-label">截止日期</label>
            <input type="date" class="inp" id="eDue" value="${a.dueDate || ''}">
          </div>
        </div>
      </div>
    </div>
    <div class="modal__footer">
      <button class="btn btn-outline" id="eCancel">取消</button>
      <button class="btn btn-primary" id="eSave">儲存變更</button>
    </div>
  `);

  el.querySelector('.modal__close').addEventListener('click', close);
  el.querySelector('#eCancel').addEventListener('click', close);
  // U-30 修正：Modal 開啟時自動聚焦任務名稱欄
  setTimeout(() => el.querySelector('#eTask')?.focus(), 50);
  el.querySelector('#eSave').addEventListener('click', () => {
    const task = el.querySelector('#eTask').value.trim();
    if (!task) { toast('任務名稱不能空白', 'error'); return; }
    const updated = {
      ...a,
      task,
      project:  el.querySelector('#eProject').value,
      category: el.querySelector('#eCategory').value,
      status:   el.querySelector('#eStatus').value,
      owner:    el.querySelector('#eOwner').value,
      dueDate:  el.querySelector('#eDue').value,
    };
    close();
    store.save('actions', updated);
    toast('✅ 已更新', 'success');
  });
};

// ── 批次完成 ───────────────────────────────────────────────────
// U-2/U-44 修正：排除 blocked 狀態、列清單確認、完成後可 undo
document.getElementById('btnMarkDone').addEventListener('click', async () => {
  const inProg = store.query('actions', a => a.status === 'in-progress');
  if (!inProg.length) { toast('沒有進行中的 Action', 'info'); return; }

  const listHtml = inProg.map(a =>
    `<li style="padding:4px 0;border-bottom:1px solid var(--color-border-default);font-size:13px;">
       <span style="color:var(--color-text-secondary);">[${a.category}]</span>
       ${a.task}
       ${a.owner ? `<span style="color:var(--color-text-tertiary);margin-left:6px;">— ${a.owner}</span>` : ''}
     </li>`
  ).join('');

  const { close, el } = modal(`
    <div class="modal__header">
      <span class="modal__title">批次標記完成</span>
      <button class="modal__close" type="button">✕</button>
    </div>
    <div class="modal__body">
      <p style="margin-bottom:var(--space-sm);font-size:var(--font-size-sm);">
        以下 <strong>${inProg.length}</strong> 個「進行中」Action 將標記為完成：
      </p>
      <ul style="list-style:none;padding:0;margin:0;max-height:260px;overflow-y:auto;">
        ${listHtml}
      </ul>
      <p style="margin-top:var(--space-md);font-size:12px;color:var(--color-text-tertiary);">此操作無法復原，請確認後繼續。</p>
    </div>
    <div class="modal__footer">
      <button class="btn btn-outline" id="_batchCancel">取消</button>
      <button class="btn btn-primary" id="_batchConfirm">✅ 全部完成</button>
    </div>
  `);

  el.querySelector('.modal__close').addEventListener('click', close);
  el.querySelector('#_batchCancel').addEventListener('click', close);
  el.querySelector('#_batchConfirm').addEventListener('click', () => {
    close();
    inProg.forEach(a => store.save('actions', { ...a, status: 'done' }));
    toast(`✅ ${inProg.length} 項已標記完成`, 'success');
  });
});

// ── 匯入 Microsoft Loop 資料 ──────────────────────────────────
document.getElementById('btnImportLoop').addEventListener('click', () => {
  document.getElementById('loopFileInput').click();
});

document.getElementById('loopFileInput').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  try {
    const text = await file.text();
    const items = JSON.parse(text);
    if (!Array.isArray(items)) throw new Error('檔案格式錯誤，預期應為陣列');
    
    let imported = 0;
    items.forEach(item => {
      if (!item.content) return; // 略過無效項目
      
      // 自動分類推測：如果 Loop 裡的分類文字帶有技術/資源，則歸入對應類別，否則預設 business
      let mappedCategory = 'business'; 
      if (item.category && item.category.includes('技術')) mappedCategory = 'technical';
      if (item.category && item.category.includes('資源')) mappedCategory = 'resource';

      // 嘗試清洗微軟 Loop 的日期字串 (例如："2025年5月21日 週三")
      let cleanDate = '';
      if (item.date) {
        const match = item.date.match(/(\d{4})年(\d{1,2})月(\d{1,2})日/);
        if (match) {
          cleanDate = `${match[1]}-${match[2].padStart(2, '0')}-${match[3].padStart(2, '0')}`;
        }
      }

      store.save('actions', {
        id: generateId(),
        category: mappedCategory,
        task: item.content,
        owner: item.owner || 'TBD',
        dueDate: cleanDate || _defaultDueDate(),
        status: item.status || 'pending',
        weekStart: new Date().toISOString().split('T')[0],
      });
      imported++;
    });
    
    toast(`✅ 成功匯入 ${imported} 筆 Loop 任務！`, 'success');
  } catch (err) {
    toast(`❌ 匯入失敗：${err.message}`, 'error');
  } finally {
    e.target.value = ''; // 確保下次可重複選取同一檔案
  }
});

function populateOwnerSelects() {
  const members = store.sortBy('members', 'name', 'asc');
  const opts = '<option value="">負責人</option>' +
    members.map(m => `<option value="${m.name}">${m.name}</option>`).join('');
  document.querySelectorAll('.owner-select').forEach(sel => {
    const cur = sel.value;
    sel.innerHTML = opts;
    sel.value = cur;
  });
}

window.addEventListener('store:updated', () => { renderAll(); populateOwnerSelects(); });
window.addEventListener('pageshow', (e) => { if (e.persisted) { renderAll(); populateOwnerSelects(); } });
window.addEventListener('storage', (e) => { if (e.key?.startsWith('pgm_sync_')) { renderAll(); populateOwnerSelects(); } });
renderAll();
populateOwnerSelects();
</script>

(function() {

  if (!btn || !menu) return;
  btn.addEventListener('click', function() {
    var open = menu.style.display === 'flex';
    menu.style.display = open ? 'none' : 'flex';
    btn.textContent = open ? '☰' : '✕';
    btn.setAttribute('aria-label', open ? '開啟選單' : '關閉選單');
  });
  menu.querySelectorAll('a').forEach(function(a) {
    a.addEventListener('click', function() {
      menu.style.display = 'none';
      btn.textContent = '☰';
      btn.setAttribute('aria-label', '開啟選單');
    });
  });
})();
