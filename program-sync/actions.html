<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Action Items — P&D Program Sync</title>
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/layout.css">
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="navbar__logo">
    <div class="navbar__logo-icon">P</div>
    <span>P&amp;D CENTER</span>
  </a>
  <span class="navbar__week-badge" id="weekBadge">–</span>
  <div class="navbar__links">
    <a href="index.html"      class="navbar__link">Dashboard</a>
    <a href="input.html"      class="navbar__link">Quick Input</a>
    <a href="risks.html"      class="navbar__link">Risks</a>
    <a href="actions.html"    class="navbar__link active">Action Items</a>
    <a href="milestones.html" class="navbar__link">Milestones</a>
    <a href="review.html"     class="navbar__link">Review</a>
    <a href="resources.html" class="navbar__link">Resources</a>

  </div>
  <div class="navbar__actions">
    <a href="report.html" class="btn btn-primary btn-sm">📝 生成週報</a>
  </div>
</nav>

<!-- 週次選擇器 -->
<div id="weekSelectorStrip" style="background:var(--color-bg-secondary);border-bottom:1px solid var(--color-border-default);padding:6px 24px;display:flex;align-items:center;gap:12px;font-size:13px;">
  <span style="color:var(--color-text-secondary);">週次：</span>
  <select class="inp" id="weekSelect" style="width:180px;padding:4px 8px;font-size:13px;">
    <option value="">— 載入中 —</option>
  </select>
  <span id="historyBadge" style="display:none;background:var(--color-warning-bg,#fff8e1);border:1px solid var(--color-warning,#e4a23c);border-radius:4px;padding:2px 8px;font-size:12px;">📅 歷史瀏覽（唯讀）</span>
</div>

<div class="page-container">
  <div class="page-header">
    <div class="page-header__left">
      <h1 class="page-header__title">Action Items</h1>
      <p class="page-header__sub">追蹤所有行動事項的執行狀態</p>
    </div>
    <div class="page-header__right">
      <button class="btn btn-outline btn-sm" id="btnMarkDone">✓ 批次完成</button>
    </div>
  </div>

  <!-- 完成率進度條 -->
  <div class="panel" style="margin-bottom:var(--space-xl);">
    <div class="panel__body" style="padding:var(--space-lg) var(--space-xl);">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--space-sm);">
        <span class="font-600">整體完成率</span>
        <div id="actionSummary" class="text-sm text-secondary"></div>
      </div>
      <div class="progress-bar" style="height:12px;">
        <div class="progress-bar__fill" id="completionBar" style="width:0%;"></div>
      </div>
      <div class="progress-bar__label" id="completionLabel">
        <span>0 / 0 項已完成</span>
        <span id="overdueCount" style="color:var(--color-danger)"></span>
      </div>
    </div>
  </div>

  <!-- 三類別面板 -->
  <div class="grid-3" id="actionPanels"></div>

</div>

<div class="toast-container" id="toastContainer"></div>

<script type="module">
import { store }   from './assets/js/store.js';
import { appInit, setSessionWeek } from './assets/js/app-init.js';
import { listWeeks } from './assets/js/api.js';
import { toast, renderBadge, formatDate, generateId, modal, isOverdue, confirm } from './assets/js/ui.js';

(async () => {
  const currentLabel = await appInit();
  // ── 週次選擇器 ──────────────────────────────────────────────
  const weeks = await listWeeks();
  const sel = document.getElementById('weekSelect');
  if (weeks.length > 0) {
    sel.innerHTML = weeks.map(w =>
      `<option value="${w.weekLabel}" ${w.weekLabel === currentLabel ? 'selected' : ''}>${w.weekLabel} — ${w.weekStart.slice(5).replace('-','/')}</option>`
    ).join('');
    sel.addEventListener('change', function() {
      const val = this.value;
      if (!val) return;
      setSessionWeek(val === weeks[0].weekLabel ? null : val);
      location.reload();
    });
  } else {
    sel.innerHTML = '<option value="">— 後端未連線 —</option>';
  }
  // ── 歷史唯讀模式 ────────────────────────────────────────────
  if (window._appInitIsHistoryMode) {
    document.getElementById('historyBadge').style.display = '';
    document.body.classList.add('is-history-readonly');
  }
})();

const CATEGORIES = [
  { id: 'technical', label: '⚙️ 技術',  color: 'var(--color-info)'    },
  { id: 'business',  label: '📋 業務',  color: 'var(--color-warning)' },
  { id: 'resource',  label: '👥 資源',  color: 'var(--color-success)' },
];

const STATUS_CYCLE = ['pending', 'in-progress', 'done', 'blocked'];

function renderAll() {
  renderProgressBar();
  renderPanels();
}

// ── 進度條 ─────────────────────────────────────────────────────
function renderProgressBar() {
  const all   = store.getAll('actions');
  const done  = all.filter(a => a.status === 'done').length;
  const total = all.length;
  const pct   = total ? Math.round((done / total) * 100) : 0;
  const today = new Date().toISOString().split('T')[0];
  const overdue = all.filter(a => a.dueDate && a.dueDate < today && a.status !== 'done').length;

  document.getElementById('completionBar').style.width = `${pct}%`;
  document.getElementById('completionBar').style.background =
    pct >= 80 ? 'var(--color-success)' : pct >= 50 ? 'var(--color-warning)' : 'var(--color-danger)';
  document.getElementById('completionLabel').innerHTML =
    `<span>${done} / ${total} 項已完成（${pct}%）</span>
     ${overdue > 0 ? `<span style="color:var(--color-danger)">⚠️ ${overdue} 項逾期</span>` : '<span style="color:var(--color-success)">無逾期</span>'}`;
  document.getElementById('actionSummary').textContent =
    `待辦 ${all.filter(a=>a.status==='pending').length} / 進行中 ${all.filter(a=>a.status==='in-progress').length} / 阻塞 ${all.filter(a=>a.status==='blocked').length}`;
}

// ── 三欄面板 ───────────────────────────────────────────────────
function renderPanels() {
  const all   = store.getAll('actions');
  const today = new Date().toISOString().split('T')[0];
  const el    = document.getElementById('actionPanels');

  el.innerHTML = CATEGORIES.map(cat => {
    const items = all.filter(a => a.category === cat.id);
    const done  = items.filter(a => a.status === 'done').length;

    const rows = items.map(a => {
      const late = isOverdue(a.dueDate) && a.status !== 'done';
      return `
        <div class="action-row ${late ? 'a-late' : ''}" id="arow-${a.id}">
          <div class="action-row__task">
            <span>${a.task}</span>
            ${a.project ? `<span class="badge badge-neutral" style="margin-left:4px;font-size:10px;">${a.project.substring(0,15)}</span>` : ''}
          </div>
          <div class="action-row__owner text-xs text-secondary">${a.owner || '—'}</div>
          <div class="action-row__due text-xs ${late ? 'text-danger' : 'text-secondary'}"
               style="${late ? 'color:var(--color-danger);font-weight:600;' : ''}">
            ${a.dueDate ? formatDate(a.dueDate) : '—'}
            ${late ? ' ⚠️' : ''}
          </div>
          <div style="display:flex;align-items:center;gap:var(--space-xs);">
            <span class="badge ${statusBadgeCls(a.status)}"
                  style="cursor:pointer;"
                  onclick="cycleStatus('${a.id}')"
                  title="點擊切換狀態">
              ${statusLabel(a.status)}
            </span>
            <button class="btn btn-ghost btn-sm" onclick="editAction('${a.id}')" style="padding:4px 8px;color:var(--color-text-tertiary);" title="編輯">✏️</button>
            <button class="btn btn-ghost btn-sm" onclick="deleteAction('${a.id}')" style="padding:4px 8px;color:var(--color-text-tertiary);" title="刪除">✕</button>
          </div>
        </div>`;
    }).join('');

    // Inline 新增表單
    const addForm = `
      <div class="inline-form" style="margin-top:var(--space-sm);">
        <input type="text" class="inp" id="newTask-${cat.id}" placeholder="新增 ${cat.label} 行動…">
        <select class="inp owner-select" id="newOwner-${cat.id}" style="width:110px;">
          <option value="">負責人</option>
        </select>
        <input type="date" class="inp" id="newDue-${cat.id}" style="width:130px;">
        <button class="btn btn-primary btn-sm" onclick="addAction('${cat.id}')">+</button>
      </div>`;

    return `
      <div class="panel">
        <div class="panel__header" style="border-left:3px solid ${cat.color};">
          <span class="panel__title">${cat.label}</span>
          <span class="badge badge-neutral">${done}/${items.length}</span>
        </div>
        <div class="panel__body" style="padding:var(--space-md) var(--space-lg);">
          ${rows || `<p class="text-sm text-secondary">尚無${cat.label}行動項</p>`}
          ${addForm}
        </div>
      </div>`;
  }).join('');
}

function statusBadgeCls(status) {
  return { 'done':'badge-success', 'in-progress':'badge-info', 'pending':'badge-neutral', 'blocked':'badge-danger' }[status] || 'badge-neutral';
}

function statusLabel(status) {
  return { 'done':'✅ 完成', 'in-progress':'🔄 進行中', 'pending':'⏳ 待辦', 'blocked':'🚫 阻塞' }[status] || status;
}

// ── 狀態循環（inline 點擊）──────────────────────────────────────
window.cycleStatus = function(id) {
  const a = store.getById('actions', id);
  if (!a) return;
  const idx = STATUS_CYCLE.indexOf(a.status);
  const next = STATUS_CYCLE[(idx + 1) % STATUS_CYCLE.length];
  store.save('actions', { ...a, status: next });
  // 不重繪全頁，只更新 badge
  renderAll();
};

// ── 新增 action ────────────────────────────────────────────────
window.addAction = function(catId) {
  const task  = document.getElementById(`newTask-${catId}`)?.value.trim();
  const owner = document.getElementById(`newOwner-${catId}`)?.value;
  const due   = document.getElementById(`newDue-${catId}`)?.value;
  if (!task) { toast('請輸入行動任務', 'error'); return; }

  store.save('actions', {
    id: generateId(),
    category: catId,
    task, owner: owner || '',
    dueDate: due || '',
    status: 'pending',
    weekStart: new Date().toISOString().split('T')[0],
  });
  toast('✅ 已新增行動', 'success');
};

// ── 刪除 ───────────────────────────────────────────────────────
// U-1/U-43 修正：styled confirm + undo toast（5 秒內可復原）
window.deleteAction = async function(id) {
  const a = store.getById('actions', id);
  if (!a) return;
  const ok = await confirm(`確定刪除此 Action？\n\n「${a.task}」`, '刪除');
  if (!ok) return;
  store.delete('actions', id);
  toast('已刪除', 'success', 5000, {
    onUndo: () => { store.save('actions', a); toast('已復原', 'info'); },
  });
};

// ── 編輯 Action（含變更專案）───────────────────────────────────
window.editAction = function(id) {
  const a = store.getById('actions', id);
  if (!a) return;

  const projects = store.sortBy('projects', 'name', 'asc');
  const members  = store.sortBy('members',  'name', 'asc');

  const projOpts = `<option value="">— 無 —</option>` +
    projects.map(p => `<option value="${p.name}" ${a.project === p.name ? 'selected' : ''}>${p.name}</option>`).join('');

  const ownerOpts = `<option value="">— 選擇 —</option>` +
    members.map(m => `<option value="${m.name}" ${a.owner === m.name ? 'selected' : ''}>${m.name}</option>`).join('');

  const catOpts = CATEGORIES.map(c =>
    `<option value="${c.id}" ${a.category === c.id ? 'selected' : ''}>${c.label}</option>`
  ).join('');

  const statusOpts = [
    { v:'pending',     l:'⏳ 待辦'   },
    { v:'in-progress', l:'🔄 進行中' },
    { v:'done',        l:'✅ 完成'   },
    { v:'blocked',     l:'🚫 阻塞'   },
  ].map(s => `<option value="${s.v}" ${a.status === s.v ? 'selected' : ''}>${s.l}</option>`).join('');

  const { close, el } = modal(`
    <div class="modal__header">
      <span class="modal__title">編輯 Action</span>
      <button class="modal__close" type="button">✕</button>
    </div>
    <div class="modal__body">
      <div class="stack">
        <div class="inp-group">
          <label class="inp-label">任務名稱</label>
          <input class="inp" id="eTask" value="${a.task.replace(/"/g,'&quot;')}" placeholder="任務描述">
        </div>
        <div class="inp-group">
          <label class="inp-label" style="color:var(--color-info);font-weight:700;">🗂 所屬專案</label>
          <select class="inp" id="eProject">${projOpts}</select>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-md);">
          <div class="inp-group">
            <label class="inp-label">分類</label>
            <select class="inp" id="eCategory">${catOpts}</select>
          </div>
          <div class="inp-group">
            <label class="inp-label">狀態</label>
            <select class="inp" id="eStatus">${statusOpts}</select>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-md);">
          <div class="inp-group">
            <label class="inp-label">負責人</label>
            <select class="inp" id="eOwner">${ownerOpts}</select>
          </div>
          <div class="inp-group">
            <label class="inp-label">截止日期</label>
            <input type="date" class="inp" id="eDue" value="${a.dueDate || ''}">
          </div>
        </div>
      </div>
    </div>
    <div class="modal__footer">
      <button class="btn btn-outline" id="eCancel">取消</button>
      <button class="btn btn-primary" id="eSave">儲存變更</button>
    </div>
  `);

  el.querySelector('.modal__close').addEventListener('click', close);
  el.querySelector('#eCancel').addEventListener('click', close);
  el.querySelector('#eSave').addEventListener('click', () => {
    const task = el.querySelector('#eTask').value.trim();
    if (!task) { toast('任務名稱不能空白', 'error'); return; }
    const updated = {
      ...a,
      task,
      project:  el.querySelector('#eProject').value,
      category: el.querySelector('#eCategory').value,
      status:   el.querySelector('#eStatus').value,
      owner:    el.querySelector('#eOwner').value,
      dueDate:  el.querySelector('#eDue').value,
    };
    close();
    store.save('actions', updated);
    toast('✅ 已更新', 'success');
  });
};

// ── 批次完成 ───────────────────────────────────────────────────
// U-2/U-44 修正：排除 blocked 狀態、列清單確認、完成後可 undo
document.getElementById('btnMarkDone').addEventListener('click', async () => {
  const inProg = store.query('actions', a => a.status === 'in-progress');
  if (!inProg.length) { toast('沒有進行中的 Action', 'info'); return; }

  const listHtml = inProg.map(a =>
    `<li style="padding:4px 0;border-bottom:1px solid var(--color-border-default);font-size:13px;">
       <span style="color:var(--color-text-secondary);">[${a.category}]</span>
       ${a.task}
       ${a.owner ? `<span style="color:var(--color-text-tertiary);margin-left:6px;">— ${a.owner}</span>` : ''}
     </li>`
  ).join('');

  const { close, el } = modal(`
    <div class="modal__header">
      <span class="modal__title">批次標記完成</span>
      <button class="modal__close" type="button">✕</button>
    </div>
    <div class="modal__body">
      <p style="margin-bottom:var(--space-sm);font-size:var(--font-size-sm);">
        以下 <strong>${inProg.length}</strong> 個「進行中」Action 將標記為完成：
      </p>
      <ul style="list-style:none;padding:0;margin:0;max-height:260px;overflow-y:auto;">
        ${listHtml}
      </ul>
      <p style="margin-top:var(--space-md);font-size:12px;color:var(--color-text-tertiary);">此操作無法復原，請確認後繼續。</p>
    </div>
    <div class="modal__footer">
      <button class="btn btn-outline" id="_batchCancel">取消</button>
      <button class="btn btn-primary" id="_batchConfirm">✅ 全部完成</button>
    </div>
  `);

  el.querySelector('.modal__close').addEventListener('click', close);
  el.querySelector('#_batchCancel').addEventListener('click', close);
  el.querySelector('#_batchConfirm').addEventListener('click', () => {
    close();
    inProg.forEach(a => store.save('actions', { ...a, status: 'done' }));
    toast(`✅ ${inProg.length} 項已標記完成`, 'success');
  });
});

function populateOwnerSelects() {
  const members = store.sortBy('members', 'name', 'asc');
  const opts = '<option value="">負責人</option>' +
    members.map(m => `<option value="${m.name}">${m.name}</option>`).join('');
  document.querySelectorAll('.owner-select').forEach(sel => {
    const cur = sel.value;
    sel.innerHTML = opts;
    sel.value = cur;
  });
}

window.addEventListener('store:updated', () => { renderAll(); populateOwnerSelects(); });
renderAll();
populateOwnerSelects();
</script>

<style>
.text-danger { color: var(--color-danger); }
/* 歷史週唯讀模式 */
body.is-history-readonly #btnMarkDone,
body.is-history-readonly .inline-form,
body.is-history-readonly .btn-ghost { opacity:.35; pointer-events:none; cursor:not-allowed; }
</style>
</body>
</html>
