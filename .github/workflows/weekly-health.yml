name: Weekly Health Check

on:
  schedule:
    # Every Wednesday 09:00 Taipei (UTC+8) = 01:00 UTC
    - cron: '0 1 * * 3'
  workflow_dispatch:

jobs:
  engineering-baseline:
    name: Build + Test Baseline
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Build backend
        run: npm run build
        working-directory: backend

      - name: Lint backend
        run: npm run lint
        working-directory: backend

      - name: Check backend formatting
        run: npm run format:check
        working-directory: backend

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python test dependencies
        run: python -m pip install -r scripts/requirements.txt

      - name: Run parser tests
        run: pytest tests/test_import_draft.py -v

  health-check:
    name: Health Check Diagnostics
    runs-on: ubuntu-latest
    needs: engineering-baseline

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run health check
        run: |
          set +e
          node agent/health-check.js > agent/health-report.json
          exit_code=$?
          set -e
          # Show summary in CI log
          node -e "
            const r = JSON.parse(require('fs').readFileSync('agent/health-report.json'));
            console.log('Passed:', r.summary.passed, '| Errors:', r.summary.errors, '| Warnings:', r.summary.warnings);
            r.issues.forEach(i => console.log(' -', i.severity.toUpperCase(), i.check, ':', i.detail));
          "
          exit $exit_code
        env:
          RAILWAY_APP_URL: ${{ secrets.RAILWAY_APP_URL }}

      - name: Upload health report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: health-report-${{ github.run_id }}
          path: agent/health-report.json
          retention-days: 30
