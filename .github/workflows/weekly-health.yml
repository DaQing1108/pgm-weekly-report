name: Weekly Health Check

on:
  schedule:
    # Every Wednesday 09:00 Taipei (UTC+8) = 01:00 UTC
    - cron: '0 1 * * 3'
  workflow_dispatch:
    inputs:
      force_pr:
        description: 'Force PR creation even if no fixes applied'
        type: boolean
        default: false

jobs:
  health-check:
    name: Diagnose + Auto-fix
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Fetch full history so we can push a new branch
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: agent/package-lock.json

      - name: Install agent dependencies
        run: npm ci
        working-directory: agent

      - name: Run health check
        id: health
        run: |
          node agent/health-check.js > agent/health-report.json || true
          echo "report_path=agent/health-report.json" >> $GITHUB_OUTPUT
          # Show summary in CI log
          node -e "
            const r = JSON.parse(require('fs').readFileSync('agent/health-report.json'));
            console.log('Passed:', r.summary.passed, '| Errors:', r.summary.errors, '| Warnings:', r.summary.warnings);
            r.issues.forEach(i => console.log(' -', i.severity.toUpperCase(), i.check, ':', i.detail));
          "
        env:
          RAILWAY_APP_URL: ${{ secrets.RAILWAY_APP_URL }}

      - name: Run fix agent
        id: fix
        run: node agent/fix-agent.js
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          HEALTH_REPORT: agent/health-report.json

      - name: Upload health report artifact
        uses: actions/upload-artifact@v4
        with:
          name: health-report-${{ github.run_id }}
          path: |
            agent/health-report.json
            agent/fix-summary.md
          retention-days: 30

      - name: Create PR with fixes
        if: steps.fix.outputs.has_fixes == 'true' || inputs.force_pr
        run: bash agent/create-pr.sh
        env:
          GH_TOKEN: ${{ github.token }}
          FIX_SUMMARY: ${{ steps.fix.outputs.summary }}
